<!doctype html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IIG Reporter</title>
<script>/* тема до отрисовки — без мигания */(function(){try{var t=localStorage.getItem('iig-theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root{
    --bg:#eaeef6; --surface:#ffffff; --surface-2:#f5f8fc; --surface-3:#eef3fa;
    --ink:#161d2c; --ink-soft:#3b4658; --muted:#6f7c90; --line:#e6ecf4; --line-soft:#eef3f9;
    --brand:#2a9fe0; --brand-2:#5571f0;
    --grad:linear-gradient(135deg,#36c5f0 0%,#2a9fe0 46%,#5571f0 100%);
    --grad-soft:linear-gradient(135deg,rgba(54,197,240,.16),rgba(85,113,240,.12));
    --ring:rgba(42,159,224,.30);
    --green:#138a55; --green-bg:#e6f6ee; --amber:#a86a00; --amber-bg:#fdf2da;
    --red:#d23b32; --red-bg:#fdeceb; --violet:#7a5af0; --violet-bg:#efeafe;
    --cyan:#0e9bc4; --cyan-bg:#e2f5fb; --slate:#5b6b80; --slate-bg:#eef2f7;
    --shadow-sm:0 1px 2px rgba(16,24,40,.05),0 2px 6px rgba(16,24,40,.06);
    --shadow-md:0 8px 24px rgba(16,24,40,.10);
    --shadow-lg:0 24px 60px rgba(16,24,40,.22);
    --radius:14px;
    --side-bg:linear-gradient(180deg,#15273e 0%,#0e1a2a 100%);
    --side-ink:#c4d2e2; --side-muted:#8094a8;
  }
  [data-theme="dark"]{
    --bg:#0b1120; --surface:#141c2c; --surface-2:#1a2333; --surface-3:#212c42;
    --ink:#e9eef7; --ink-soft:#c3cde0; --muted:#8a98b0; --line:#27324a; --line-soft:#202a40;
    --grad-soft:linear-gradient(135deg,rgba(54,197,240,.18),rgba(85,113,240,.14));
    --ring:rgba(85,113,240,.45);
    --green:#34d399; --green-bg:#102a22; --amber:#fbbf57; --amber-bg:#2c2410;
    --red:#f87171; --red-bg:#2c1818; --violet:#a78bfa; --violet-bg:#211a39;
    --cyan:#38bdf8; --cyan-bg:#102733; --slate:#9aa7bd; --slate-bg:#1b2638;
    --shadow-sm:0 1px 2px rgba(0,0,0,.30),0 2px 8px rgba(0,0,0,.28);
    --shadow-md:0 10px 30px rgba(0,0,0,.40);
    --shadow-lg:0 28px 70px rgba(0,0,0,.55);
    --side-bg:linear-gradient(180deg,#0f1828 0%,#0a1320 100%);
    --side-ink:#c4d2e2; --side-muted:#7d8ea4;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Segoe UI Variable Text","Segoe UI",Inter,system-ui,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1100px 520px at 100% -10%,rgba(85,113,240,.10),transparent 60%),radial-gradient(900px 480px at -10% 110%,rgba(54,197,240,.10),transparent 55%);
    background-attachment:fixed;}
  a{color:var(--brand);text-decoration:none;cursor:pointer}
  a:hover{text-decoration:underline}
  ::selection{background:rgba(85,113,240,.25)}
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh}

  /* ---------- sidebar ---------- */
  .side{background:var(--side-bg);color:var(--side-ink);padding:16px 14px;display:flex;flex-direction:column;gap:4px;
    border-right:1px solid rgba(255,255,255,.04)}
  .brand{display:flex;align-items:center;gap:11px;padding:8px 8px 18px;font-size:17px;letter-spacing:.2px;color:#fff}
  .brand .logo{width:34px;height:34px;border-radius:10px;background:var(--grad);display:grid;place-items:center;font-size:17px;
    box-shadow:0 6px 16px rgba(42,159,224,.45)}
  .brand-tx{font-weight:600}.brand-tx b{font-weight:800}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:11px;color:var(--side-ink);font-weight:500;
    position:relative;transition:background .14s,color .14s}
  .nav a .ic{width:20px;text-align:center;font-size:15px;opacity:.92}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.active{background:var(--grad-soft);color:#fff}
  .nav a.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:4px;border-radius:0 4px 4px 0;background:var(--grad)}
  .nav-badge{margin-left:auto}
  .side .spacer{flex:1}
  .mini{font-size:12px;color:var(--side-muted);padding:10px;border-top:1px solid rgba(255,255,255,.06);margin-top:8px;line-height:1.6}
  .mini-2{opacity:.8}
  .btn-connect{margin:12px 2px 2px;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--grad);
    color:#fff;padding:11px;border-radius:11px;font-weight:650;cursor:pointer;box-shadow:0 8px 20px rgba(42,159,224,.40);
    transition:transform .12s,filter .12s}
  .btn-connect:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn-connect span{font-size:16px}

  /* ---------- main ---------- */
  .main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .top{height:62px;background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:saturate(1.4) blur(8px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 22px;flex:0 0 auto;z-index:5}
  .top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px}
  .top .grow{flex:1}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:650;padding:6px 12px;border-radius:999px;
    background:var(--green-bg);color:var(--green);box-shadow:var(--shadow-sm)}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor;position:relative}
  .pill .dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:currentColor;opacity:.35;animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.8);opacity:0}}
  .pill.grey{background:var(--slate-bg);color:var(--muted)}
  .pill.grey .dot::after{animation:none}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);cursor:pointer;
    font-size:15px;display:grid;place-items:center;transition:background .12s,transform .12s}
  .icon-btn:hover{background:var(--surface-2);transform:translateY(-1px)}
  .content{padding:24px;max-width:1200px;overflow:auto;width:100%}
  section[data-view]{display:none}
  section[data-view].on{display:block;animation:fade .26s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.title{font-size:21px;margin:0 0 3px;font-weight:750;letter-spacing:.2px}
  .sub{color:var(--muted);margin:0 0 20px}

  /* ---------- stat cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:20px}
  .card{--cc:var(--brand);--cc-bg:rgba(42,159,224,.14);
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;
    box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:13px;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
  .card::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;
    background:var(--cc-bg);opacity:.5;filter:blur(6px)}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
  .card-ic{width:46px;height:46px;border-radius:13px;background:var(--cc-bg);color:var(--cc);display:grid;place-items:center;
    font-size:21px;flex:0 0 auto;z-index:1}
  .card-meta{z-index:1;min-width:0}
  .card-k{font-size:12px;color:var(--muted);font-weight:650;text-transform:uppercase;letter-spacing:.03em}
  .card-v{font-size:26px;font-weight:800;margin-top:2px;color:var(--cc);line-height:1.1}
  .c-cyan{--cc:var(--cyan);--cc-bg:var(--cyan-bg)}
  .c-green{--cc:var(--green);--cc-bg:var(--green-bg)}
  .c-amber{--cc:var(--amber);--cc-bg:var(--amber-bg)}
  .c-violet{--cc:var(--violet);--cc-bg:var(--violet-bg)}
  .c-red{--cc:var(--red);--cc-bg:var(--red-bg)}
  .c-slate{--cc:var(--slate);--cc-bg:var(--slate-bg)}

  /* ---------- panels ---------- */
  .grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:16px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
  .panel h3{margin:0;padding:14px 17px;border-bottom:1px solid var(--line);font-size:14px;font-weight:700;
    display:flex;align-items:center;gap:9px;background:var(--surface-2)}
  .h3-ic{font-size:15px}
  .panel .body{padding:16px 17px}
  .panel.hero h3{background:var(--grad-soft)}
  .row-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}

  .alert{display:flex;gap:11px;align-items:flex-start;padding:12px 14px;border-radius:11px;margin-bottom:10px;font-size:13.5px;
    border:1px solid transparent}
  .alert:last-child{margin-bottom:0}
  .alert.amber{background:var(--amber-bg);color:var(--amber);border-color:color-mix(in srgb,var(--amber) 28%,transparent)}
  .alert.red{background:var(--red-bg);color:var(--red);border-color:color-mix(in srgb,var(--red) 26%,transparent)}
  .alert.grey{background:var(--slate-bg);color:var(--ink-soft);border-color:var(--line)}
  .alert b{font-weight:700}
  .alert a{color:inherit;font-weight:700;text-decoration:underline}
  .ok-empty{color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px}

  /* ---------- tables ---------- */
  table{width:100%;border-collapse:collapse}
  .panel table th,.panel table td{padding:12px 16px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
  .panel table tr:last-child td{border-bottom:none}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--surface-2);font-weight:700;
    position:sticky;top:0;z-index:1}
  tbody tr{transition:background .1s}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr.click{cursor:pointer}
  .scrollx{overflow-x:auto}
  .panel td select{max-width:230px}
  .panel td{white-space:nowrap}
  .panel td:first-child{white-space:normal}

  /* ---------- controls ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  input,select,textarea{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
    color:var(--ink);transition:border-color .12s,box-shadow .12s}
  input::placeholder,textarea::placeholder{color:var(--muted)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--ring)}
  input[type=search]{min-width:260px}
  .btn{font:inherit;font-weight:650;padding:9px 14px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
    color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .12s,transform .1s,box-shadow .12s}
  .btn:hover{background:var(--surface-2);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(42,159,224,.34)}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:9px}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .r-ic{display:inline-block}

  .badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .b-green{background:var(--green-bg);color:var(--green)}
  .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-red{background:var(--red-bg);color:var(--red)}
  .b-grey{background:var(--slate-bg);color:var(--muted)}

  .muted{color:var(--muted)}.right{text-align:right}.nowrap{white-space:nowrap}
  .chip{display:inline-flex;align-items:center;background:var(--surface-3);border:1px solid var(--line);border-radius:8px;
    padding:3px 9px;font-size:12px;margin:2px 3px 2px 0;color:var(--ink-soft)}

  /* ---------- match rows ---------- */
  .matchrow{display:grid;grid-template-columns:1fr 110px 1fr 150px;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);
    border-radius:12px;background:var(--surface);margin-bottom:11px;transition:border-color .12s,box-shadow .12s,transform .12s}
  .matchrow:hover{border-color:color-mix(in srgb,var(--brand) 40%,var(--line));box-shadow:var(--shadow-sm);transform:translateY(-1px)}
  .matchrow .arrow{text-align:center;color:var(--muted)}
  .conf{font-size:12px;font-weight:800;margin-top:2px}
  .conf.hi{color:var(--green)}.conf.mid{color:var(--amber)}.conf.lo{color:var(--muted)}
  .src{font-weight:650}.src small{display:block;color:var(--muted);font-weight:400;margin-top:2px}

  /* ---------- overlays ---------- */
  .drawer-bg,.modal-bg{position:fixed;inset:0;background:rgba(11,17,32,.5);backdrop-filter:blur(3px);display:none;z-index:40;opacity:0;transition:opacity .2s}
  .drawer-bg.on,.modal-bg.on{display:block;opacity:1}
  .drawer{position:fixed;top:0;right:0;height:100%;width:480px;max-width:96vw;background:var(--surface);
    box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.22,1,.36,1);z-index:41;display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .drawer header,.modal header{padding:17px 19px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .drawer header h3,.modal header h3{margin:0;font-size:16px;font-weight:700}
  .drawer .body{padding:20px;overflow:auto;flex:1}
  .drawer footer,.modal footer{padding:15px 19px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2)}
  .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;transition:background .12s}
  .x:hover{background:var(--surface-2);color:var(--ink)}
  .field{margin-bottom:17px}.field label{display:block;font-weight:650;margin-bottom:7px;font-size:13px}
  .field .hint{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.5}
  .field select,.field input,.field textarea{width:100%}
  .modal{position:fixed;z-index:41;left:50%;top:50%;transform:translate(-50%,-48%) scale(.97);opacity:0;pointer-events:none;
    width:580px;max-width:94vw;background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;
    transition:opacity .2s,transform .2s}
  .modal.on{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
  .modal .body{padding:20px}
  .link-box{display:flex;gap:8px;margin-top:9px}.link-box input{flex:1;font-family:ui-monospace,"Cascadia Code",monospace;font-size:12.5px}
  .goalrow{display:grid;grid-template-columns:130px 1fr 34px;gap:8px;margin-bottom:7px}

  /* ---------- telegram preview ---------- */
  .tg{background:var(--surface-3);border-radius:14px;padding:20px;min-height:130px;
    background-image:radial-gradient(circle at 20% 20%,rgba(85,113,240,.06) 0,transparent 40%),radial-gradient(circle at 80% 80%,rgba(54,197,240,.07) 0,transparent 40%)}
  .tg .bubble{background:var(--surface);border-radius:14px;border-top-left-radius:4px;padding:15px 17px;max-width:470px;
    box-shadow:var(--shadow-sm);white-space:pre-wrap;font-size:13.5px;line-height:1.55;border:1px solid var(--line)}
  .tg .meta{font-size:11px;color:var(--muted);margin-top:8px}

  /* ---------- tabs (segmented) ---------- */
  .tabs{display:inline-flex;gap:3px;margin-bottom:16px;background:var(--surface-2);border:1px solid var(--line);padding:4px;border-radius:12px}
  .tabs .t{padding:8px 16px;border-radius:9px;font-weight:650;cursor:pointer;color:var(--muted);transition:all .14s}
  .tabs .t:hover{color:var(--ink)}
  .tabs .t.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

  .kvs{display:grid;grid-template-columns:180px 1fr;gap:11px 14px;align-items:center}.kvs .k{color:var(--muted)}
  .note{background:var(--grad-soft);border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);border-radius:11px;
    padding:12px 15px;color:var(--ink-soft);font-size:13px;line-height:1.55}

  /* ---------- toasts ---------- */
  #toast{position:fixed;right:20px;bottom:20px;z-index:60;display:flex;flex-direction:column;gap:9px}
  .toast{background:#10202b;color:#fff;padding:12px 16px;border-radius:11px;box-shadow:var(--shadow-md);font-size:13.5px;max-width:380px;
    animation:slidein .25s cubic-bezier(.22,1,.36,1);border-left:3px solid var(--brand)}
  @keyframes slidein{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  .toast.err{background:#7a1a14;border-left-color:#ffb4ad}.toast.ok{background:#0f6d3b;border-left-color:#7ff0b6}

  .spin{display:inline-block;width:15px;height:15px;border:2px solid color-mix(in srgb,var(--brand) 25%,transparent);
    border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .empty{color:var(--muted);padding:26px;text-align:center}

  /* ---------- scrollbars ---------- */
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 45%,transparent);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--muted) 70%,transparent);background-clip:padding-box}

  @media (max-width:920px){.grid2{grid-template-columns:1fr}}
  @media (max-width:760px){.app{grid-template-columns:72px 1fr}.brand-tx,.nav a span:not(.ic):not(.nav-badge),.btn-connect span:last-child,.mini{display:none}
    .nav a{justify-content:center}.btn-connect{padding:11px 0}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="logo">📊</span><span class="brand-tx">IIG <b>Reporter</b></span></div>
    <nav class="nav" id="nav">
      <a data-go="dashboard" class="active"><span class="ic">🏠</span><span>Обзор</span></a>
      <a data-go="clients"><span class="ic">👥</span><span>Клиенты</span></a>
      <a data-go="chats"><span class="ic">💬</span><span>Чаты</span></a>
      <a data-go="match"><span class="ic">🔗</span><span>Привязки</span><span class="badge b-amber nav-badge" id="navMatch" style="display:none">0</span></a>
      <a data-go="reports"><span class="ic">📨</span><span>Отчёты</span></a>
      <a data-go="settings"><span class="ic">⚙️</span><span>Настройки</span></a>
      <a data-go="guide"><span class="ic">📖</span><span>Гайд</span></a>
    </nav>
    <div class="btn-connect" onclick="openOnboard()"><span>＋</span><span>Подключить клиента</span></div>
    <div class="spacer"></div>
    <div class="mini" id="botInfo">Загрузка…</div>
  </aside>

  <div class="main">
    <header class="top">
      <h1 id="crumb">Обзор</h1>
      <div class="grow"></div>
      <span class="pill" id="botPill"><span class="dot"></span> Слушатель</span>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Светлая / тёмная тема">🌙</button>
      <button class="btn sm" onclick="refresh()"><span class="r-ic">⟳</span> Обновить</button>
    </header>
    <div class="content">
      <section data-view="dashboard" class="on"><div id="v_dashboard" class="empty">…</div></section>
      <section data-view="clients"><div id="v_clients"></div></section>
      <section data-view="chats"><div id="v_chats"></div></section>
      <section data-view="match"><div id="v_match"></div></section>
      <section data-view="reports"><div id="v_reports"></div></section>
      <section data-view="settings"><div id="v_settings"></div></section>
      <section data-view="guide"><div id="v_guide"></div></section>
    </div>
  </div>
</div>

<!-- DRAWER: client -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <header><h3 id="drTitle">Клиент</h3><span class="x" onclick="closeDrawer()">×</span></header>
  <div class="body" id="drBody"></div>
  <footer>
    <button class="btn" onclick="drawerTest()">📨 Тестовый отчёт</button>
    <button class="btn primary" onclick="drawerSave()">Сохранить</button>
  </footer>
</div>

<!-- MODAL: onboarding -->
<div class="modal-bg" id="modalBg" onclick="closeOnboard()"></div>
<div class="modal" id="modal">
  <header><h3>Подключить клиента</h3><span class="x" onclick="closeOnboard()">×</span></header>
  <div class="body" id="obBody"></div>
  <footer><button class="btn" onclick="closeOnboard()">Закрыть</button></footer>
</div>

<div id="toast"></div>

<script>
/* ---------- инфраструктура ---------- */
let READY=false, CLIENTS=[], CHATS=[];
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(msg,kind){const w=document.getElementById('toast');const d=document.createElement('div');d.className='toast'+(kind?(' '+kind):'');d.textContent=msg;w.appendChild(d);setTimeout(()=>d.remove(),kind==='err'?6000:3500);}
async function callBackend(method,args){
  // Десктоп: pywebview.api.<method>(...args).  Веб: POST /api/<method> с JSON-массивом аргументов.
  if(window.pywebview&&window.pywebview.api){return await window.pywebview.api[method](...args);}
  const resp=await fetch('/api/'+method,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(args)});
  return await resp.json();
}
async function api(method,...args){
  let r;
  try{r=await callBackend(method,args);}
  catch(e){toast('Нет связи с backend: '+e.message,'err');throw e;}
  if(!r||r.ok!==true){const e=(r&&r.error)||'Неизвестная ошибка';toast(e,'err');throw new Error(e);}
  return r.data;
}
function el(id){return document.getElementById(id);}

/* ---------- тема ---------- */
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('iig-theme',t);}catch(e){}const b=el('themeBtn');if(b)b.textContent=(t==='dark'?'☀️':'🌙');}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme')||'light';applyTheme(cur==='dark'?'light':'dark');}

/* ---------- роутинг ---------- */
const NAMES={dashboard:'Обзор',clients:'Клиенты',chats:'Чаты',match:'Привязки',reports:'Отчёты',settings:'Настройки',guide:'Гайд'};
function go(v){
  document.querySelectorAll('section[data-view]').forEach(s=>s.classList.toggle('on',s.dataset.view===v));
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.go===v));
  el('crumb').textContent=NAMES[v]||'';
  render(v);
}
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(a)go(a.dataset.go);});
let CURRENT='dashboard';
function render(v){CURRENT=v;({dashboard:renderDashboard,clients:renderClients,chats:renderChats,match:renderMatch,reports:renderReports,settings:renderSettings,guide:renderGuide}[v]||(()=>{}))();}
function refresh(){render(CURRENT);loadBadges();}

/* ---------- бейджи/статус ---------- */
async function loadBadges(){
  try{const d=await api('dashboard');const b=el('navMatch');if(d.unbound_chats>0){b.style.display='inline-block';b.textContent=d.unbound_chats;}else{b.style.display='none';}}catch(e){}
}

/* ---------- DASHBOARD ---------- */
function statCard(color,ic,label,val){
  return `<div class="card c-${color}"><div class="card-ic">${ic}</div><div class="card-meta"><div class="card-k">${label}</div><div class="card-v">${val}</div></div></div>`;
}
async function renderDashboard(){
  const host=el('v_dashboard');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  let d;try{d=await api('dashboard');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  host.innerHTML=`
    <h2 class="title">Обзор</h2><p class="sub">Сводка по клиентам, чатам и рассылке.</p>
    <div class="cards">
      ${statCard('blue','👥','Клиентов',d.clients)}
      ${statCard('cyan','💬','Чатов',d.chats)}
      ${statCard('green','🔗','Привязано',d.bound)}
      ${statCard(d.unbound_chats?'amber':'slate','📥','Без привязки',d.unbound_chats)}
      ${statCard(d.clients_no_chat?'violet':'slate','📇','Клиентов без чата',d.clients_no_chat)}
      ${statCard(d.errors?'red':'green','✓','Ошибок',d.errors)}
    </div>
    <div class="grid2">
      <div class="panel"><h3><span class="h3-ic">🛎️</span> Требует внимания</h3><div class="body" id="dashAlerts"></div></div>
      <div class="panel hero"><h3><span class="h3-ic">📨</span> Рассылка</h3><div class="body">
        <p class="muted">Сформировать и отправить отчёты во все привязанные чаты за прошлую неделю.</p>
        <div class="row-actions">
          <button class="btn primary" onclick="runWeekly()">📨 Запустить рассылку сейчас</button>
          <button class="btn" onclick="go('reports')">История</button>
        </div>
      </div></div>
    </div>`;
  const a=el('dashAlerts');let h='';
  if(d.unbound_chats>0)h+=`<div class="alert amber">⚠️ <div><b>${d.unbound_chats} чат(ов) без привязки</b> — бот добавлен, но не знает клиента. <a onclick="go('match')">Сопоставить →</a></div></div>`;
  if(d.clients_no_chat>0)h+=`<div class="alert grey">📇 <div><b>${d.clients_no_chat} клиент(ов) без чата</b>. <a onclick="openOnboard()">Подключить →</a></div></div>`;
  if(d.errors>0)h+=`<div class="alert red">❌ <div><b>${d.errors}</b> ошибок отправки в истории. <a onclick="go('reports')">Открыть →</a></div></div>`;
  a.innerHTML=h||'<div class="ok-empty">Всё в порядке ✅</div>';
}

/* ---------- CLIENTS ---------- */
async function renderClients(){
  const host=el('v_clients');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  try{CLIENTS=await api('clients');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  host.innerHTML=`
    <h2 class="title">Клиенты</h2><p class="sub">Клик по строке — настройки клиента (цели, атрибуция, чат).</p>
    <div class="toolbar">
      <input type="search" id="clSearch" placeholder="🔎 Поиск по названию или логину…" oninput="drawClients()">
      <select id="clFilter" onchange="drawClients()"><option value="">Все</option><option value="bound">С привязкой</option><option value="unbound">Без чата</option></select>
      <div style="flex:1"></div>
      <button class="btn" onclick="doSync()">🔄 Подтянуть из Директа</button>
      <button class="btn" onclick="doImport()">⬇ Импорт config.json</button>
    </div>
    <div class="panel"><div class="scrollx"><table>
      <thead><tr><th>Клиент</th><th>Логин</th><th>Чат</th><th>Цели</th><th>Атрибуция</th><th>Источник</th></tr></thead>
      <tbody id="clBody"></tbody></table></div></div>`;
  drawClients();
}
function drawClients(){
  const q=(el('clSearch').value||'').toLowerCase(),f=el('clFilter').value;
  const rows=CLIENTS.filter(c=>{
    if(q&&!(String(c.name).toLowerCase().includes(q)||String(c.login).toLowerCase().includes(q)))return false;
    if(f==='bound'&&!c.chat_id)return false;
    if(f==='unbound'&&c.chat_id)return false;return true;});
  const b=el('clBody');
  if(!rows.length){b.innerHTML='<tr><td colspan="6" class="empty">Нет клиентов. Нажми «Подтянуть из Директа» или «Импорт config.json».</td></tr>';return;}
  b.innerHTML=rows.map(c=>`
    <tr class="click" onclick="openClient('${esc(c.login)}')">
      <td><b>${esc(c.name)}</b></td><td class="muted">${esc(c.login)}</td>
      <td>${c.chat_title?('💬 '+esc(c.chat_title)):'<span class="muted">— не привязан</span>'}</td>
      <td>${(c.goals&&c.goals.length)?c.goals.map(g=>'<span class="chip">'+esc(g.name||g.id)+'</span>').join(''):'<span class="muted">— нет</span>'}</td>
      <td>${esc(c.attribution||'LSC')}</td><td class="muted">${esc(c.source||'')}</td>
    </tr>`).join('');
}
async function doSync(){try{toast('Запрашиваю клиентов из Директа…');const r=await api('sync_clients');toast('Синхронизировано: '+r.synced,'ok');refresh();}catch(e){}}
async function doImport(){try{const r=await api('import_config');toast('Импорт: клиентов '+r.clients+', привязок '+r.bindings,'ok');refresh();}catch(e){}}

/* ---------- CHATS ---------- */
async function renderChats(){
  const host=el('v_chats');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  let chats,cls;try{chats=await api('chats');cls=await api('clients');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  CHATS=chats;
  const opts=cls.map(c=>`<option value="${esc(c.login)}">${esc(c.name)} (${esc(c.login)})</option>`).join('');
  host.innerHTML=`
    <h2 class="title">Чаты</h2><p class="sub">Чаты появляются автоматически, когда бота туда добавляют. Сопоставь чат с клиентом.</p>
    <div class="panel"><div class="scrollx"><table>
      <thead><tr><th>Чат</th><th>ID</th><th>Тип</th><th>Статус</th><th>Привязка</th><th></th></tr></thead>
      <tbody>${chats.length?chats.map(c=>`
        <tr>
          <td>${esc(c.title)}</td><td class="muted">${c.chat_id}</td><td>${esc(c.type||'')}</td>
          <td>${c.status==='active'?'<span class="badge b-green">активен</span>':'<span class="badge b-grey">удалён</span>'}</td>
          <td><select id="bind_${c.chat_id}"><option value="">— не привязан —</option>${opts}</select></td>
          <td class="right"><button class="btn sm primary" onclick="doBind(${c.chat_id})">Сохранить</button> <button class="btn sm" onclick="doDeleteChat(${c.chat_id})" title="Удалить чат из базы">🗑</button></td>
        </tr>`).join(''):'<tr><td colspan="6" class="empty">Пока нет чатов. Запусти бота и добавь его в чат.</td></tr>'}
      </tbody></table></div></div>`;
  chats.forEach(c=>{if(c.login){const s=el('bind_'+c.chat_id);if(s)s.value=c.login;}});
}
async function doBind(chatId){const sel=el('bind_'+chatId);try{await api('bind',chatId,sel.value);toast(sel.value?'Привязано':'Привязка снята','ok');refresh();}catch(e){}}
async function doDeleteChat(chatId){
  if(!confirm('Удалить чат '+chatId+' из базы? Привязка к клиенту тоже снимется.\n(Сам чат в Telegram это не трогает — бот просто забудет о нём.)'))return;
  try{await api('delete_chat',chatId);toast('Чат удалён из базы','ok');refresh();}catch(e){}
}

/* ---------- MATCH ---------- */
async function renderMatch(){
  const host=el('v_match');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  let d;try{d=await api('suggestions');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  const opts=d.free_clients.map(c=>`<option value="${esc(c.login)}">${esc(c.name)} (${esc(c.login)})</option>`).join('');
  let rows=d.matches.map(m=>{
    const cc=m.confidence>=70?'hi':(m.confidence>=45?'mid':'lo');
    const right=m.suggest_login
      ? `<div class="src">🏢 ${esc(m.suggest_name)}<small>${esc(m.suggest_login)}</small></div>`
      : `<div><select id="mansel_${m.chat_id}" style="width:100%"><option value="">— выбрать клиента —</option>${opts}</select></div>`;
    const act=m.suggest_login
      ? `<div><button class="btn primary sm" onclick="doBind2(${m.chat_id},'${esc(m.suggest_login)}')">Привязать</button></div>`
      : `<div><button class="btn primary sm" onclick="doBindManual(${m.chat_id})">Привязать</button></div>`;
    return `<div class="matchrow">
      <div class="src">💬 ${esc(m.chat_title)}<small>чат ${m.chat_id}</small></div>
      <div class="arrow">↔ <div class="conf ${cc}">${m.suggest_login?(m.confidence+'%'):'нет совпадений'}</div></div>
      ${right}${act}</div>`;}).join('');
  host.innerHTML=`
    <h2 class="title">Привязки</h2>
    <p class="sub">Главный ручной шаг — сопоставить «чат ↔ клиент». Система предлагает совпадение, тебе остаётся подтвердить.</p>
    <div class="panel"><div class="body">
      ${d.matches.length?rows:'<div class="empty">Нет чатов без привязки 🎉</div>'}
      <div class="note" style="margin-top:6px">🔒 В Telegram привязку командой /bind подтверждает только администратор (защита от ошибочной привязки чужого чата).</div>
    </div></div>`;
}
async function doBind2(chatId,login){try{await api('bind',chatId,login);toast('Привязано','ok');refresh();}catch(e){}}
async function doBindManual(chatId){const s=el('mansel_'+chatId);if(!s.value){toast('Выбери клиента','err');return;}try{await api('bind',chatId,s.value);toast('Привязано','ok');refresh();}catch(e){}}

/* ---------- GUIDE ---------- */
function renderGuide(){
  el('v_guide').innerHTML=`
    <h2 class="title">Гайд</h2><p class="sub">Как пользоваться программой — по шагам.</p>
    <div class="panel"><h3><span class="h3-ic">⚡</span> Быстрый старт</h3><div class="body">
      <ol>
        <li><b>Запусти программу.</b> <code>IIGReporter.exe</code> и <code>secrets.json</code> должны лежать в одной папке.</li>
        <li><b>Включи VPN на весь трафик.</b> Telegram в РФ заблокирован — без VPN будет «Нет связи». Яндексу VPN не нужен.</li>
        <li><b>Настройки → впиши токены</b> (Telegram и Yandex) и свой Telegram ID в «Администраторы» → Сохранить.</li>
        <li><b>Клиенты → «Подтянуть из Директа»</b> — подтянет всех клиентов агентства.</li>
        <li><b>Подключи бота к чату клиента</b> и привяжи чат к клиенту (см. ниже).</li>
        <li><b>Отчёты → Предпросмотр → «Отправить тест»</b>, потом «Запустить рассылку».</li>
      </ol>
    </div></div>
    <div class="panel"><h3><span class="h3-ic">🔗</span> Как привязать чат к клиенту</h3><div class="body">
      <p><b>Способ 1 (просто):</b> кнопка <b>＋ Подключить клиента</b> → выбери клиента → «Получить ссылку» → открой ссылку → выбери группу клиента. Бот зайдёт и сам привяжется.</p>
      <p><b>Способ 2 (вручную):</b> добавь бота в группу клиента → он появится во вкладке <b>Чаты</b> → во вкладке <b>Привязки</b> подтверди предложенного клиента (или выбери вручную).</p>
      <div class="note">⚠️ Программа должна быть запущена, когда добавляешь бота — фоновый слушатель ловит новые чаты.</div>
    </div></div>
    <div class="panel"><h3><span class="h3-ic">📨</span> Отчёты и рассылка</h3><div class="body">
      <p><b>Отчёты → Предпросмотр</b> — выбери клиента, увидишь готовый текст. «Отправить тест» пришлёт его в привязанный чат.</p>
      <p><b>Запустить рассылку</b> — отправит отчёты за прошлую неделю по всем привязанным клиентам (кнопка на «Обзоре» и в «Отчётах»).</p>
      <p><b>Автозапуск (Пн 09:00):</b> в Планировщике задач Windows создай задачу на <code>IIGReporter.exe weekly</code> (VPN должен быть включён в это время).</p>
    </div></div>
    <div class="panel"><h3><span class="h3-ic">🩹</span> Если что-то не так</h3><div class="body">
      <ul>
        <li><b>«Нет связи»</b> — программа не достучалась до Telegram. Проверь VPN (режим «весь трафик»), нажми «Обновить».</li>
        <li><b>Бот молчит / отвечает дважды</b> — запускай только одну копию программы. Бот отвечает, только пока окно открыто.</li>
        <li><b>Лишний чат-«висяк»</b> (бота уже выгнали, а строка осталась) — кнопка 🗑 во вкладке «Чаты» удалит его из базы.</li>
        <li><b>Клиенты/привязки пропали</b> — база <code>iigbot.sqlite3</code> лежит рядом с exe и своя для каждой папки/пользователя Windows. Перенеси этот файл, чтобы перенести привязки.</li>
      </ul>
    </div></div>`;
}

/* ---------- REPORTS ---------- */
let RTAB='prev';
async function renderReports(){
  const host=el('v_reports');
  let cls;try{cls=await api('clients');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  const bound=cls.filter(c=>c.chat_id);
  const opts=(bound.length?bound:cls).map(c=>`<option value="${esc(c.login)}">${esc(c.name)} (${esc(c.login)})</option>`).join('');
  host.innerHTML=`
    <h2 class="title">Отчёты</h2><p class="sub">Предпросмотр сообщения и история рассылок.</p>
    <div class="tabs"><div class="t ${RTAB==='prev'?'on':''}" onclick="setRtab('prev')">Предпросмотр</div><div class="t ${RTAB==='hist'?'on':''}" onclick="setRtab('hist')">История</div></div>
    <div id="rpane"></div>`;
  if(RTAB==='prev'){
    el('rpane').innerHTML=`<div class="grid2">
      <div class="panel"><h3><span class="h3-ic">⚙️</span> Параметры</h3><div class="body">
        <div class="field"><label>Клиент</label><select id="rpClient">${opts||'<option>нет клиентов</option>'}</select></div>
        <div class="field"><label>Период</label><input value="Прошлая неделя (Пн–Вс)" disabled></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn primary" onclick="doPreview()">👁 Сформировать превью</button>
          <button class="btn" onclick="doSendTest()">📨 Отправить тест в чат</button>
        </div>
        <div class="note" style="margin-top:14px">Формат 1:1 как у текущего отчёта: итог по аккаунту + кампании, цели, спящие, расход с НДС, приписка специалиста.</div>
      </div></div>
      <div class="panel"><h3><span class="h3-ic">📱</span> Как увидит клиент</h3><div class="body"><div class="tg"><div class="bubble" id="rpBubble"><span class="muted">Нажми «Сформировать превью».</span></div><div class="meta" id="rpMeta"></div></div></div></div>
    </div>`;
  }else{
    el('rpane').innerHTML='<div class="panel"><div id="histBody" class="empty"><span class="spin"></span> загрузка…</div></div>';
    try{const h=await api('history');el('histBody').outerHTML=histTable(h);}catch(e){el('histBody').innerHTML='Ошибка: '+esc(e.message);}
  }
}
function setRtab(t){RTAB=t;renderReports();}
function histTable(h){
  if(!h.length)return '<div class="scrollx"><table><thead><tr><th>Дата</th><th>Клиент</th><th>Чат</th><th>Период</th><th>Статус</th></tr></thead><tbody><tr><td colspan="5" class="empty">Пока нет отправок.</td></tr></tbody></table></div>';
  const badge=s=>s==='sent'?'<span class="badge b-green">отправлено</span>':(s==='error'?'<span class="badge b-red">ошибка</span>':'<span class="badge b-grey">'+esc(s)+'</span>');
  return '<div class="scrollx"><table><thead><tr><th>Дата</th><th>Клиент</th><th>Чат</th><th>Период</th><th>Статус</th></tr></thead><tbody>'+
    h.map(r=>`<tr><td class="nowrap">${esc((r.sent_at||'').replace('T',' ').slice(0,16))}</td><td>${esc(r.client_name)}</td><td>${r.chat_title?esc(r.chat_title):'<span class="muted">—</span>'}</td><td class="muted nowrap">${esc(r.period_from)}…${esc(r.period_to)}</td><td>${badge(r.status)}${r.error?(' <span class="muted">'+esc(r.error)+'</span>'):''}</td></tr>`).join('')+
    '</tbody></table></div>';
}
async function doPreview(){
  const login=el('rpClient').value;if(!login)return;
  el('rpBubble').innerHTML='<span class="spin"></span> запрашиваю данные из Директа…';el('rpMeta').textContent='';
  try{const r=await api('preview',login);
    if(r.text===null){el('rpBubble').innerHTML='<span class="muted">'+esc(r.reason)+'</span>';}
    else{el('rpBubble').textContent=r.text;el('rpMeta').textContent='кампаний: '+r.campaigns+' · предпросмотр, не отправлено';}
  }catch(e){el('rpBubble').innerHTML='<span class="muted">Ошибка: '+esc(e.message)+'</span>';}
}
async function doSendTest(){
  const login=el('rpClient').value;if(!login)return;
  if(!confirm('Отправить тестовый отчёт в привязанный чат клиента?'))return;
  try{const r=await api('send_test',login);
    if(r.status==='sent')toast('Отправлено в чатов: '+r.chats,'ok');
    else if(r.status==='no_chat')toast('У клиента нет привязанного чата','err');
    else toast('Пропущено: '+(r.reason||r.status),'err');
    if(RTAB==='hist')renderReports();
  }catch(e){}
}
async function runWeekly(){
  if(!confirm('Запустить рассылку по ВСЕМ привязанным клиентам за прошлую неделю?'))return;
  toast('Запускаю рассылку…');
  try{const r=await api('run_weekly');toast(`Готово: отправлено ${r.sent}, пропущено ${r.skipped}, без чата ${r.no_chat}, ошибок ${r.errors}`,'ok');}catch(e){}
}

/* ---------- SETTINGS ---------- */
async function renderSettings(){
  const host=el('v_settings');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  let s;try{s=await api('settings');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  const tgOk=s.telegram.status==='ок';
  host.innerHTML=`
    <h2 class="title">Настройки</h2><p class="sub">Токены, доступы, тексты и расписание.</p>
    <div class="grid2">
      <div class="panel"><h3><span class="h3-ic">🔌</span> Подключения</h3><div class="body"><div class="kvs">
        <div class="k">Telegram бот</div><div>${tgOk?('<span class="badge b-green">✓ @'+esc(s.telegram.username||'')+'</span>'):('<span class="badge b-red">'+esc(s.telegram.status)+'</span>')}</div>
        <div class="k">Яндекс OAuth</div><div>${s.yandex.status==='ок'?'<span class="badge b-green">✓ подключён</span>':'<span class="badge b-red">нет токена</span>'}</div>
      </div>
      <div class="field" style="margin-top:14px"><label>Telegram bot token</label><input id="stTgToken" placeholder="${s.telegram.has_token?'задан — оставь пустым, чтобы не менять':'вставь токен от @BotFather'}"></div>
      <div class="field"><label>Yandex OAuth токен</label><input id="stYaToken" placeholder="${s.yandex.has_token?'задан — оставь пустым, чтобы не менять':'вставь OAuth токен Яндекс.Директа'}"></div>
      <button class="btn primary" onclick="saveTokens()">Сохранить токены</button>
      <div class="hint" style="margin-top:8px">Пишутся в secrets.json рядом с программой. После сохранения бот подхватит их сам; если не отвечает — перезапусти программу.</div>
      </div></div>
      <div class="panel"><h3><span class="h3-ic">🔐</span> Доступ к привязкам</h3><div class="body">
        <div class="field"><label>Администраторы (Telegram ID, через запятую)</label><input id="stAdmins" value="${esc((s.admin_user_ids||[]).join(', '))}"><div class="hint">Только они могут /bind в Telegram. Свой id — у @userinfobot.</div></div>
      </div></div>
    </div>
    <div class="panel" style="margin-top:16px"><h3><span class="h3-ic">✍️</span> Тексты и расписание</h3><div class="body">
      <div class="field"><label>Вступление</label><input id="stIntro" value="${esc(s.intro)}"></div>
      <div class="field"><label>Приписка специалиста</label><input id="stNote" value="${esc(s.specialist_note)}"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
        <div class="field"><label>Атрибуция по умолчанию</label><select id="stAttr">${['LSC','LC','FC','LYDC'].map(a=>`<option ${a===s.attribution_model?'selected':''}>${a}</option>`).join('')}</select></div>
        <div class="field"><label>День рассылки</label><input id="stDay" value="${esc(s.report_day)}"></div>
        <div class="field"><label>Время</label><input id="stTime" value="${esc(s.report_time)}"></div>
      </div>
      <div class="note" style="margin-bottom:14px">Время рассылки — справочно. Запуск по расписанию настраивается в «Планировщике задач» Windows (запуск этой программы/скрипта). Кнопка «Запустить рассылку сейчас» работает в любой момент.</div>
      <button class="btn primary" onclick="saveSettings()">Сохранить</button>
    </div></div>`;
}
async function saveSettings(){
  const admins=(el('stAdmins').value||'').split(/[,\s]+/).filter(Boolean);
  try{await api('save_settings',el('stIntro').value,el('stNote').value,el('stAttr').value,admins,el('stDay').value,el('stTime').value);
    toast('Сохранено','ok');}catch(e){}
}
async function saveTokens(){
  const tg=(el('stTgToken').value||'').trim(), ya=(el('stYaToken').value||'').trim();
  if(!tg && !ya){ toast('Введи хотя бы один токен','err'); return; }
  try{ await api('save_secrets', tg, ya); toast('Токены сохранены','ok'); el('stTgToken').value='';el('stYaToken').value=''; refresh(); }catch(e){}
}

/* ---------- DRAWER (client) ---------- */
let DR_LOGIN=null;
async function openClient(login){
  DR_LOGIN=login;el('drawerBg').classList.add('on');el('drawer').classList.add('on');
  el('drTitle').textContent=login;el('drBody').innerHTML='<div class="empty"><span class="spin"></span></div>';
  let c;try{c=await api('client',login);}catch(e){el('drBody').innerHTML='Ошибка';return;}
  el('drTitle').innerHTML=esc(c.name)+' <span class="muted" style="font-weight:400">· '+esc(c.login)+'</span>';
  el('drBody').innerHTML=`
    <div class="field"><label>Название</label><input id="dName" value="${esc(c.name)}"></div>
    <div class="field"><label>Привязанные чаты</label><div>${c.chats.length?c.chats.map(ch=>'<span class="chip">💬 '+esc(ch.title)+'</span>').join(''):'<span class="muted">— нет. Привяжи во вкладке «Чаты»/«Привязки».</span>'}</div></div>
    <div class="field"><label>Модель атрибуции</label><select id="dAttr">${['LSC','LC','FC','LYDC'].map(a=>`<option ${a===c.attribution?'selected':''}>${a}</option>`).join('')}</select></div>
    <div class="field"><label>Цели Метрики (конверсии)</label><div id="dGoals"></div>
      <button class="btn sm" onclick="addGoal()" style="margin-top:6px">＋ Добавить цель</button>
      <div class="hint">ID цели из Яндекс.Метрики и понятное название. Авто-подгрузку из Метрики добавим позже.</div></div>`;
  const g=el('dGoals');g.innerHTML='';(c.goals||[]).forEach(x=>addGoal(x.id,x.name));
}
function addGoal(id,name){
  const row=document.createElement('div');row.className='goalrow';
  row.innerHTML=`<input placeholder="ID" value="${esc(id||'')}"><input placeholder="Название" value="${esc(name||'')}"><button class="btn sm" onclick="this.parentNode.remove()">✕</button>`;
  el('dGoals').appendChild(row);
}
function collectGoals(){return [...document.querySelectorAll('#dGoals .goalrow')].map(r=>{const i=r.querySelectorAll('input');return {id:i[0].value.trim(),name:i[1].value.trim()};}).filter(g=>g.id);}
async function drawerSave(){
  try{await api('save_client',DR_LOGIN,el('dName').value,collectGoals(),el('dAttr').value);toast('Сохранено','ok');closeDrawer();if(CURRENT==='clients')renderClients();}catch(e){}
}
async function drawerTest(){
  if(!confirm('Отправить тестовый отчёт в чат клиента?'))return;
  try{const r=await api('send_test',DR_LOGIN);toast(r.status==='sent'?('Отправлено: '+r.chats):('Статус: '+(r.reason||r.status)),r.status==='sent'?'ok':'err');}catch(e){}
}
function closeDrawer(){el('drawerBg').classList.remove('on');el('drawer').classList.remove('on');}

/* ---------- ONBOARDING ---------- */
async function openOnboard(){
  el('modalBg').classList.add('on');el('modal').classList.add('on');
  el('obBody').innerHTML='<div class="empty"><span class="spin"></span></div>';
  let cls;try{cls=await api('clients');}catch(e){el('obBody').innerHTML='Ошибка';return;}
  const free=cls.filter(c=>!c.chat_id);
  const opts=(free.length?free:cls).map(c=>`<option value="${esc(c.login)}">${esc(c.name)} (${esc(c.login)})</option>`).join('');
  el('obBody').innerHTML=`
    <div class="field"><label>1 · Клиент</label><select id="obClient">${opts||'<option>нет клиентов</option>'}</select></div>
    <div class="field"><label>2 · Ссылка для подключения</label>
      <div class="note">Добавь бота в чат клиента по этой ссылке — чат привяжется автоматически (deep-link). Либо привяжи уже добавленный чат во вкладке «Чаты».</div>
      <div class="link-box"><input id="obLink" readonly placeholder="нажми «Получить ссылку»"><button class="btn" onclick="genLink()">Получить ссылку</button></div>
      <div class="hint" id="obHint"></div></div>`;
}
async function genLink(){
  const login=el('obClient').value;if(!login)return;
  try{const r=await api('connect_link',login);el('obLink').value=r.link;el('obLink').select();document.execCommand&&document.execCommand('copy');el('obHint').textContent='Ссылка скопирована. Открой её и выбери чат клиента.';}catch(e){}
}
function closeOnboard(){el('modalBg').classList.remove('on');el('modal').classList.remove('on');}

/* ---------- init ---------- */
function init(){
  if(READY)return;READY=true;
  const t=document.documentElement.getAttribute('data-theme')||'light';const tb=el('themeBtn');if(tb)tb.textContent=(t==='dark'?'☀️':'🌙');
  el('botInfo').textContent='Готово';
  go('dashboard');loadBadges();
  api('settings').then(s=>{el('botInfo').innerHTML='Бот: @'+esc((s.telegram&&s.telegram.username)||'?')+'<br><span class="mini-2">Десктоп · ПК-режим</span>';
    el('botPill').innerHTML='<span class="dot"></span> '+(s.telegram.status==='ок'?'Подключён':'Нет связи');
    if(s.telegram.status!=='ок')el('botPill').classList.add('grey');}).catch(()=>{});
}
window.addEventListener('pywebviewready',init);                                  // десктоп
setTimeout(()=>{if(!READY&&location.protocol.indexOf('http')===0)init();},120);  // веб (браузер)
setTimeout(()=>{if(!READY&&window.pywebview&&window.pywebview.api)init();},600);  // десктоп (запас)
setTimeout(()=>{if(!READY)el('v_dashboard').innerHTML='<div class="empty">Нет связи с backend.<br>Десктоп: запусти IIGReporter.exe. Веб: открой адрес веб-версии в браузере.</div>';},2500);
</script>
</body>
</html>
