<!doctype html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IIG Reporter — кабинет</title>
<link rel="icon" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="theme-color" content="#0171B0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Inter:wght@600;700&display=swap" rel="stylesheet">
<script>/* тема до отрисовки — без мигания */(function(){try{var t=localStorage.getItem('iig-theme');if(!t)t=(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches)?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<style>
  :root{
    --bg:#eef5fc; --surface:#ffffff; --surface-2:#f3f9fe; --surface-3:#e7f2fb;
    --ink:#0c1f30; --ink-soft:#31465b; --muted:#647a90; --line:#dde9f5; --line-soft:#edf4fb;
    --brand:#0171B0; --brand-2:#3897FF;
    --grad:linear-gradient(135deg,#3897FF 0%,#0171B0 55%,#014281 100%);
    --grad-soft:linear-gradient(135deg,rgba(56,151,255,.15),rgba(1,113,176,.10));
    --ring:rgba(1,113,176,.32);
    --green:#138a55; --green-bg:#e6f6ee; --amber:#a86a00; --amber-bg:#fff2d6;
    --red:#d23b32; --red-bg:#fdeceb; --violet:#7a5af0; --violet-bg:#efeafe;
    --cyan:#0e9bc4; --cyan-bg:#e2f5fb; --slate:#5b6b80; --slate-bg:#eaf1f8;
    --accent:#FFB739; --accent-ink:#7a5200;
    --shadow-sm:0 1px 2px rgba(1,66,129,.06),0 2px 8px rgba(1,66,129,.07);
    --shadow-md:0 10px 28px rgba(1,66,129,.12);
    --shadow-lg:0 24px 60px rgba(1,66,129,.22);
    --radius:14px;
    --side-bg:linear-gradient(180deg,#013a6b 0%,#01213e 100%);
    --side-ink:#c3d8ec; --side-muted:#7e97b2;
  }
  [data-theme="dark"]{
    --bg:#08111f; --surface:#0f1c2c; --surface-2:#152435; --surface-3:#1d3047;
    --ink:#e9eef7; --ink-soft:#c3cde0; --muted:#8a98b0; --line:#233549; --line-soft:#1a2839;
    --grad:linear-gradient(135deg,#3897FF 0%,#0171B0 60%,#01508a 100%);
    --grad-soft:linear-gradient(135deg,rgba(56,151,255,.20),rgba(1,113,176,.15));
    --ring:rgba(56,151,255,.48);
    --green:#34d399; --green-bg:#102a22; --amber:#fbbf57; --amber-bg:#2c2410;
    --red:#f87171; --red-bg:#2c1818; --violet:#a78bfa; --violet-bg:#211a39;
    --cyan:#38bdf8; --cyan-bg:#102733; --slate:#9aa7bd; --slate-bg:#1b2638;
    --accent:#FFB739; --accent-ink:#FFB739;
    --shadow-sm:0 1px 2px rgba(0,0,0,.30),0 2px 8px rgba(0,0,0,.28);
    --shadow-md:0 10px 30px rgba(0,0,0,.40);
    --shadow-lg:0 28px 70px rgba(0,0,0,.55);
    --side-bg:linear-gradient(180deg,#0a1c30 0%,#06111f 100%);
    --side-ink:#c4d2e2; --side-muted:#7d8ea4;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:'Rubik',"Segoe UI",system-ui,Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1100px 520px at 100% -10%,rgba(56,151,255,.12),transparent 60%),radial-gradient(900px 480px at -10% 110%,rgba(1,113,176,.10),transparent 55%);
    background-attachment:fixed;}
  a{color:var(--brand);text-decoration:none;cursor:pointer}
  a:hover{text-decoration:underline}
  ::selection{background:rgba(85,113,240,.25)}
  .app{display:grid;grid-template-columns:248px 1fr;height:100vh}

  /* ---------- sidebar ---------- */
  .side{background:var(--side-bg);color:var(--side-ink);padding:16px 14px;display:flex;flex-direction:column;gap:4px;
    border-right:1px solid rgba(255,255,255,.04)}
  .brand{display:flex;align-items:center;gap:11px;padding:8px 8px 18px;font-size:17px;letter-spacing:.2px;color:#fff}
  .brand .logo{width:36px;height:36px;border-radius:11px;background:#fff;display:grid;place-items:center;overflow:hidden;
    box-shadow:0 6px 16px rgba(1,66,129,.38)}
  .brand .logo img{width:30px;height:30px;display:block}
  .brand-tx{font-weight:600}.brand-tx b{font-weight:800}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:4px}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:11px;color:var(--side-ink);font-weight:500;
    position:relative;transition:background .14s,color .14s}
  .nav a .ic{width:20px;text-align:center;font-size:15px;opacity:.92}
  .nav a:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav a.active{background:var(--grad-soft);color:#fff}
  .nav a.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:4px;border-radius:0 4px 4px 0;background:var(--grad)}
  .nav-badge{margin-left:auto}
  .side .spacer{flex:1}
  .mini{font-size:12px;color:var(--side-muted);padding:10px;border-top:1px solid rgba(255,255,255,.06);margin-top:8px;line-height:1.6}
  .mini-2{opacity:.8}
  .btn-connect{margin:12px 2px 2px;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--grad);
    color:#fff;padding:11px;border-radius:11px;font-weight:650;cursor:pointer;box-shadow:0 8px 20px rgba(42,159,224,.40);
    transition:transform .12s,filter .12s}
  .btn-connect:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn-connect span{font-size:16px}

  /* ---------- main ---------- */
  .main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
  .top{height:62px;background:color-mix(in srgb,var(--surface) 86%,transparent);backdrop-filter:saturate(1.4) blur(8px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 22px;flex:0 0 auto;z-index:5}
  .top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px}
  .top .grow{flex:1}
  .pill{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:650;padding:6px 12px;border-radius:999px;
    background:var(--green-bg);color:var(--green);box-shadow:var(--shadow-sm)}
  .pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor;position:relative}
  .pill .dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:currentColor;opacity:.35;animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.8);opacity:0}}
  .pill.grey{background:var(--slate-bg);color:var(--muted)}
  .pill.grey .dot::after{animation:none}
  .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--surface);cursor:pointer;
    font-size:15px;display:grid;place-items:center;transition:background .12s,transform .12s}
  .icon-btn:hover{background:var(--surface-2);transform:translateY(-1px)}
  .content{padding:24px;max-width:1200px;overflow:auto;width:100%}
  section[data-view]{display:none}
  section[data-view].on{display:block;animation:fade .26s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h2.title{font-size:21px;margin:0 0 3px;font-weight:750;letter-spacing:.2px}
  .sub{color:var(--muted);margin:0 0 20px}

  /* ---------- stat cards ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:20px}
  .card{--cc:var(--brand);--cc-bg:rgba(42,159,224,.14);
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;
    box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:13px;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
  .card::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;
    background:var(--cc-bg);opacity:.5;filter:blur(6px)}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
  .card-ic{width:46px;height:46px;border-radius:13px;background:var(--cc-bg);color:var(--cc);display:grid;place-items:center;
    font-size:21px;flex:0 0 auto;z-index:1}
  .card-meta{z-index:1;min-width:0}
  .card-k{font-size:12px;color:var(--muted);font-weight:650;text-transform:uppercase;letter-spacing:.03em}
  .card-v{font-size:26px;font-weight:800;margin-top:2px;color:var(--cc);line-height:1.1}
  .c-cyan{--cc:var(--cyan);--cc-bg:var(--cyan-bg)}
  .c-green{--cc:var(--green);--cc-bg:var(--green-bg)}
  .c-amber{--cc:var(--amber);--cc-bg:var(--amber-bg)}
  .c-violet{--cc:var(--violet);--cc-bg:var(--violet-bg)}
  .c-red{--cc:var(--red);--cc-bg:var(--red-bg)}
  .c-slate{--cc:var(--slate);--cc-bg:var(--slate-bg)}

  /* ---------- panels ---------- */
  .grid2{display:grid;grid-template-columns:1.45fr 1fr;gap:16px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
  .panel h3{margin:0;padding:14px 17px;border-bottom:1px solid var(--line);font-size:14px;font-weight:700;
    display:flex;align-items:center;gap:9px;background:var(--surface-2)}
  .h3-ic{font-size:15px}
  .panel .body{padding:16px 17px}
  .panel.hero h3{background:var(--grad-soft)}
  .row-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}

  .alert{display:flex;gap:11px;align-items:flex-start;padding:12px 14px;border-radius:11px;margin-bottom:10px;font-size:13.5px;
    border:1px solid transparent}
  .alert:last-child{margin-bottom:0}
  .alert.amber{background:var(--amber-bg);color:var(--amber);border-color:color-mix(in srgb,var(--amber) 28%,transparent)}
  .alert.red{background:var(--red-bg);color:var(--red);border-color:color-mix(in srgb,var(--red) 26%,transparent)}
  .alert.grey{background:var(--slate-bg);color:var(--ink-soft);border-color:var(--line)}
  .alert b{font-weight:700}
  .alert a{color:inherit;font-weight:700;text-decoration:underline}
  .ok-empty{color:var(--green);font-weight:600;display:flex;align-items:center;gap:6px}

  /* ---------- tables ---------- */
  table{width:100%;border-collapse:collapse}
  .panel table th,.panel table td{padding:12px 16px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
  .panel table tr:last-child td{border-bottom:none}
  th{font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--surface-2);font-weight:700;
    position:sticky;top:0;z-index:1}
  tbody tr{transition:background .1s}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr.click{cursor:pointer}
  .scrollx{overflow-x:auto}
  .panel td select{max-width:230px}
  .panel td{white-space:nowrap}
  .panel td:first-child{white-space:normal}

  /* ---------- controls ---------- */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  input,select,textarea{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
    color:var(--ink);transition:border-color .12s,box-shadow .12s}
  input::placeholder,textarea::placeholder{color:var(--muted)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--ring)}
  input[type=search]{min-width:260px}
  .btn{font:inherit;font-weight:650;padding:9px 14px;border:1px solid var(--line);border-radius:10px;background:var(--surface);
    color:var(--ink-soft);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .12s,transform .1s,box-shadow .12s}
  .btn:hover{background:var(--surface-2);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.primary{background:var(--grad);border-color:transparent;color:#fff;box-shadow:0 6px 16px rgba(42,159,224,.34)}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:9px}
  .btn:disabled{opacity:.5;cursor:default;transform:none}
  .r-ic{display:inline-block}

  .badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .b-green{background:var(--green-bg);color:var(--green)}
  .b-amber{background:var(--amber-bg);color:var(--amber)}
  .b-red{background:var(--red-bg);color:var(--red)}
  .b-grey{background:var(--slate-bg);color:var(--muted)}

  .muted{color:var(--muted)}.right{text-align:right}.nowrap{white-space:nowrap}
  .chip{display:inline-flex;align-items:center;background:var(--surface-3);border:1px solid var(--line);border-radius:8px;
    padding:3px 9px;font-size:12px;margin:2px 3px 2px 0;color:var(--ink-soft)}

  /* ---------- match rows ---------- */
  .matchrow{display:grid;grid-template-columns:1fr 110px 1fr 150px;align-items:center;gap:12px;padding:14px;border:1px solid var(--line);
    border-radius:12px;background:var(--surface);margin-bottom:11px;transition:border-color .12s,box-shadow .12s,transform .12s}
  .matchrow:hover{border-color:color-mix(in srgb,var(--brand) 40%,var(--line));box-shadow:var(--shadow-sm);transform:translateY(-1px)}
  .matchrow .arrow{text-align:center;color:var(--muted)}
  .conf{font-size:12px;font-weight:800;margin-top:2px}
  .conf.hi{color:var(--green)}.conf.mid{color:var(--amber)}.conf.lo{color:var(--muted)}
  .src{font-weight:650}.src small{display:block;color:var(--muted);font-weight:400;margin-top:2px}

  /* ---------- overlays ---------- */
  .drawer-bg,.modal-bg{position:fixed;inset:0;background:rgba(11,17,32,.5);backdrop-filter:blur(3px);display:none;z-index:40;opacity:0;transition:opacity .2s}
  .drawer-bg.on,.modal-bg.on{display:block;opacity:1}
  .drawer{position:fixed;top:0;right:0;height:100%;width:480px;max-width:96vw;background:var(--surface);
    box-shadow:var(--shadow-lg);transform:translateX(100%);transition:transform .26s cubic-bezier(.22,1,.36,1);z-index:41;display:flex;flex-direction:column}
  .drawer.on{transform:translateX(0)}
  .drawer header,.modal header{padding:17px 19px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .drawer header h3,.modal header h3{margin:0;font-size:16px;font-weight:700}
  .drawer .body{padding:20px;overflow:auto;flex:1}
  .drawer footer,.modal footer{padding:15px 19px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2)}
  .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:22px;line-height:1;width:30px;height:30px;border-radius:8px;display:grid;place-items:center;transition:background .12s}
  .x:hover{background:var(--surface-2);color:var(--ink)}
  .field{margin-bottom:17px}.field label{display:block;font-weight:650;margin-bottom:7px;font-size:13px}
  .field .hint{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.5}
  .field select,.field input,.field textarea{width:100%}
  .modal{position:fixed;z-index:41;left:50%;top:50%;transform:translate(-50%,-48%) scale(.97);opacity:0;pointer-events:none;
    width:580px;max-width:94vw;background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;
    transition:opacity .2s,transform .2s}
  .modal.on{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
  .modal .body{padding:20px}
  .link-box{display:flex;gap:8px;margin-top:9px}.link-box input{flex:1;font-family:ui-monospace,"Cascadia Code",monospace;font-size:12.5px}
  .goalrow{display:grid;grid-template-columns:46px 120px 1fr 34px;gap:8px;margin-bottom:7px;align-items:center}
  .ga-wrap{display:flex;align-items:center;justify-content:center;cursor:pointer}
  .goalrow.head{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
  .goalrow input[type=checkbox]{width:17px;height:17px;accent-color:var(--brand);cursor:pointer}

  /* ---------- telegram preview ---------- */
  .tg{background:var(--surface-3);border-radius:14px;padding:20px;min-height:130px;
    background-image:radial-gradient(circle at 20% 20%,rgba(85,113,240,.06) 0,transparent 40%),radial-gradient(circle at 80% 80%,rgba(54,197,240,.07) 0,transparent 40%)}
  .tg .bubble{background:var(--surface);border-radius:14px;border-top-left-radius:4px;padding:15px 17px;max-width:470px;
    box-shadow:var(--shadow-sm);white-space:pre-wrap;font-size:13.5px;line-height:1.55;border:1px solid var(--line)}
  .tg .meta{font-size:11px;color:var(--muted);margin-top:8px}

  /* ---------- tabs (segmented) ---------- */
  .tabs{display:inline-flex;gap:3px;margin-bottom:16px;background:var(--surface-2);border:1px solid var(--line);padding:4px;border-radius:12px}
  .tabs .t{padding:8px 16px;border-radius:9px;font-weight:650;cursor:pointer;color:var(--muted);transition:all .14s}
  .tabs .t:hover{color:var(--ink)}
  .tabs .t.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-sm)}

  .kvs{display:grid;grid-template-columns:180px 1fr;gap:11px 14px;align-items:center}.kvs .k{color:var(--muted)}
  .note{background:var(--grad-soft);border:1px solid color-mix(in srgb,var(--brand) 22%,transparent);border-radius:11px;
    padding:12px 15px;color:var(--ink-soft);font-size:13px;line-height:1.55}

  /* ---------- toasts ---------- */
  #toast{position:fixed;right:20px;bottom:20px;z-index:60;display:flex;flex-direction:column;gap:9px}
  .toast{background:#10202b;color:#fff;padding:12px 16px;border-radius:11px;box-shadow:var(--shadow-md);font-size:13.5px;max-width:380px;
    animation:slidein .25s cubic-bezier(.22,1,.36,1);border-left:3px solid var(--brand)}
  @keyframes slidein{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
  .toast.err{background:#7a1a14;border-left-color:#ffb4ad}.toast.ok{background:#0f6d3b;border-left-color:#7ff0b6}

  .spin{display:inline-block;width:15px;height:15px;border:2px solid color-mix(in srgb,var(--brand) 25%,transparent);
    border-top-color:var(--brand);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .empty{color:var(--muted);padding:26px;text-align:center}

  /* ---------- scrollbars ---------- */
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 45%,transparent);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--muted) 70%,transparent);background-clip:padding-box}

  @media (max-width:920px){.grid2{grid-template-columns:1fr}}
  @media (max-width:760px){.app{grid-template-columns:72px 1fr}.brand-tx,.nav a span:not(.ic):not(.nav-badge),.btn-connect span:last-child,.mini{display:none}
    .nav a{justify-content:center}.btn-connect{padding:11px 0}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><span class="logo"><img src="/favicon.svg" alt="IIG"></span><span class="brand-tx">IIG <b>Reporter</b></span></div>
    <nav class="nav" id="nav">
      <a data-go="dashboard" class="active"><span class="ic">🏠</span><span>Обзор</span></a>
      <a data-go="clients"><span class="ic">👥</span><span>Клиенты</span></a>
      <a data-go="chats"><span class="ic">💬</span><span>Чаты</span></a>
      <a data-go="match"><span class="ic">🔗</span><span>Привязки</span><span class="badge b-amber nav-badge" id="navMatch" style="display:none">0</span></a>
      <a data-go="reports"><span class="ic">📨</span><span>Отчёты</span></a>
      <a data-go="gsheets"><span class="ic">📗</span><span>Таблицы</span></a>
      <a data-go="settings"><span class="ic">⚙️</span><span>Настройки</span></a>
      <a data-go="users" id="navUsers" style="display:none"><span class="ic">🔑</span><span>Пользователи</span></a>
      <a data-go="guide"><span class="ic">📖</span><span>Гайд</span></a>
    </nav>
    <div class="btn-connect" onclick="openOnboard()"><span>＋</span><span>Подключить клиента</span></div>
    <div class="spacer"></div>
    <div class="mini" id="botInfo">Загрузка…</div>
  </aside>

  <div class="main">
    <header class="top">
      <h1 id="crumb">Обзор</h1>
      <div class="grow"></div>
      <span class="pill" id="botPill"><span class="dot"></span> Слушатель</span>
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Светлая / тёмная тема">🌙</button>
      <button class="btn sm" onclick="refresh()"><span class="r-ic">⟳</span> Обновить</button>
      <span class="userbox" id="userBox" style="display:none">
        <span class="user-ava" id="userAva">?</span>
        <span class="user-meta"><b id="userName">—</b><span class="mini-2" id="userRole"></span></span>

<style>

  <form class="login-card" id="loginForm" onsubmit="doLogin(event)">

<div id="toast"></div>

<script>
/* ---------- инфраструктура ---------- */
let READY=false, CLIENTS=[], CHATS=[], ME=null;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(msg,kind){const w=document.getElementById('toast');const d=document.createElement('div');d.className='toast'+(kind?(' '+kind):'');d.textContent=msg;w.appendChild(d);setTimeout(()=>d.remove(),kind==='err'?6000:3500);}
async function callBackend(method,args){
  // Десктоп: pywebview.api.<method>(...args).  Веб: POST /api/<method> с JSON-массивом аргументов.
  if(window.pywebview&&window.pywebview.api){return await window.pywebview.api[method](...args);}
  const resp=await fetch('/api/'+method,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(args)});
  return await resp.json();
}
async function api(method,...args){
  let r;
  try{r=await callBackend(method,args);}
  catch(e){toast('Нет связи с backend: '+e.message,'err');throw e;}
  if(!r||r.ok!==true){const e=(r&&r.error)||'Неизвестная ошибка';
    if(e==='not_authenticated'){ME=null;applyUser();showLogin(false);throw new Error(e);}
    toast(e,'err');throw new Error(e);}
  return r.data;
}
function el(id){return document.getElementById(id);}

/* ---------- тема ---------- */
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('iig-theme',t);}catch(e){}const b=el('themeBtn');if(b)b.textContent=(t==='dark'?'☀️':'🌙');}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme')||'light';applyTheme(cur==='dark'?'light':'dark');}

/* ---------- роутинг ---------- */
const NAMES={dashboard:'Обзор',clients:'Клиенты',chats:'Чаты',match:'Привязки',reports:'Отчёты',gsheets:'Google-таблицы',settings:'Настройки',users:'Пользователи',guide:'Гайд'};
function go(v){
  document.querySelectorAll('section[data-view]').forEach(s=>s.classList.toggle('on',s.dataset.view===v));
  document.querySelectorAll('#nav a').forEach(a=>a.classList.toggle('active',a.dataset.go===v));
  el('crumb').textContent=NAMES[v]||'';
  render(v);
}
document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(a)go(a.dataset.go);});
let CURRENT='dashboard';
function render(v){CURRENT=v;({dashboard:renderDashboard,clients:renderClients,chats:renderChats,match:renderMatch,reports:renderReports,gsheets:renderGSheets,settings:renderSettings,users:renderUsers,guide:renderGuide}[v]||(()=>{}))();}
function refresh(){render(CURRENT);loadBadges();}

/* ---------- бейджи/статус ---------- */
async function loadBadges(){
  try{const d=await api('dashboard');const b=el('navMatch');if(d.unbound_chats>0){b.style.display='inline-block';b.textContent=d.unbound_chats;}else{b.style.display='none';}}catch(e){}
}

/* ---------- DASHBOARD ---------- */
function statCard(color,ic,label,val){
  return `<div class="card c-${color}"><div class="card-ic">${ic}</div><div class="card-meta"><div class="card-k">${label}</div><div class="card-v">${val}</div></div></div>`;
}
async function renderDashboard(){
  const host=el('v_dashboard');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  let d;try{d=await api('dashboard');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  host.innerHTML=`
    <h2 class="title">Обзор</h2><p class="sub">Сводка по клиентам, чатам и рассылке.</p>
    <div class="cards">
      ${statCard('blue','👥','Клиентов',d.clients)}
      ${statCard('cyan','💬','Чатов',d.chats)}
      ${statCard('green','🔗','Привязано',d.bound)}
      ${statCard(d.unbound_chats?'amber':'slate','📥','Без привязки',d.unbound_chats)}
      ${statCard(d.clients_no_chat?'violet':'slate','📇','Клиентов без чата',d.clients_no_chat)}
      ${statCard(d.errors?'red':'green','✓','Ошибок',d.errors)}
    </div>
    <div class="grid2">
      <div class="panel"><h3><span class="h3-ic">🛎️</span> Требует внимания</h3><div class="body" id="dashAlerts"></div></div>
      <div class="panel hero"><h3><span class="h3-ic">📨</span> Рассылка</h3><div class="body">
        <p class="muted">Сформировать и отправить отчёты в чаты ваших клиентов за прошлую неделю.</p>
        <div class="row-actions">
          <button class="btn primary" onclick="runWeekly()">📨 Запустить рассылку сейчас</button>
          <button class="btn" onclick="runDry()" title="Собрать отчёты с прогрессом, но клиентам НЕ отправлять — проверка перед боевым запуском">🧪 Проба (без отправки)</button>
          <button class="btn" onclick="go('reports')">История</button>
        </div>
      </div></div>
    </div>`;
  const a=el('dashAlerts');let h='';
  if(d.unbound_chats>0)h+=`<div class="alert amber">⚠️ <div><b>${d.unbound_chats} чат(ов) без привязки</b> — бот добавлен, но не знает клиента. <a onclick="go('match')">Сопоставить →</a></div></div>`;
  if(d.clients_no_chat>0)h+=`<div class="alert grey">📇 <div><b>${d.clients_no_chat} клиент(ов) без чата</b>. <a onclick="openOnboard()">Подключить →</a></div></div>`;
  if(d.errors>0)h+=`<div class="alert red">❌ <div><b>${d.errors}</b> ошибок отправки в истории. <a onclick="go('reports')">Открыть →</a></div></div>`;
  a.innerHTML=h||'<div class="ok-empty">Всё в порядке ✅</div>';
}

/* ---------- CLIENTS ---------- */
async function renderClients(){
  const host=el('v_clients');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  try{CLIENTS=await api('clients');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  host.innerHTML=`
    <h2 class="title">Клиенты</h2><p class="sub">Клик по строке — настройки клиента (цели, атрибуция, чат).</p>
    <div class="toolbar">
      <input type="search" id="clSearch" placeholder="🔎 Поиск по названию или логину…" oninput="drawClients()">
      <select id="clFilter" onchange="drawClients()"><option value="">Все</option><option value="bound">С привязкой</option><option value="unbound">Без чата</option></select>
      <div style="flex:1"></div>
      <button class="btn" onclick="doSync()">🔄 Подтянуть из Директа</button>
      <button class="btn" onclick="doBulkGoals()">🎯 Цели из Метрики (всем)</button>
      <button class="btn" onclick="doImport()">⬇ Импорт config.json</button>
    </div>
    <div class="panel"><div class="scrollx"><table>
      <thead><tr><th>Клиент</th><th>Логин</th><th>Чат</th><th>Цели</th><th>Атрибуция</th><th>Источник</th></tr></thead>
      <tbody id="clBody"></tbody></table></div></div>`;
  drawClients();
}
function drawClients(){
  const q=(el('clSearch').value||'').toLowerCase(),f=el('clFilter').value;
  const rows=CLIENTS.filter(c=>{
    if(q&&!(String(c.name).toLowerCase().includes(q)||String(c.login).toLowerCase().includes(q)))return false;
    if(f==='bound'&&!c.chat_id)return false;
    if(f==='unbound'&&c.chat_id)return false;return true;});
  const b=el('clBody');
  if(!rows.length){b.innerHTML='<tr><td colspan="6" class="empty">Нет клиентов. Нажми «Подтянуть из Директа» или «Импорт config.json».</td></tr>';return;}
  b.innerHTML=rows.map(c=>`
    <tr class="click" onclick="openClient('${esc(c.login)}')">
      <td><b>${esc(c.name)}</b></td><td class="muted">${esc(c.login)}</td>
      <td>${c.chat_title?('💬 '+esc(c.chat_title)):'<span class="muted">— не привязан</span>'}</td>
      <td>${(c.goals&&c.goals.length)?c.goals.map(g=>'<span class="chip">'+esc(g.name||g.id)+'</span>').join(''):'<span class="muted">— нет</span>'}</td>
      <td>${esc(c.attribution||'LSC')}</td><td class="muted">${esc(c.source||'')}</td>
    </tr>`).join('');
}
async function doSync(){try{toast('Запрашиваю клиентов из Директа…');const r=await api('sync_clients');toast('Синхронизировано: '+r.synced,'ok');refresh();}catch(e){}}
async function doImport(){try{const r=await api('import_config');toast('Импорт: клиентов '+r.clients+', привязок '+r.bindings,'ok');refresh();}catch(e){}}
async function doBulkGoals(){
  if(!confirm('Подтянуть цели из Метрики для ВСЕХ привязанных клиентов?\nКлючевые включатся для отчётов, остальные сохранятся выключенными. Уже настроенные вручную галки не сбросятся.'))return;
  toast('Подтягиваю цели из Метрики всем привязанным… это может занять время');
  try{const r=await api('metrika_goals_bulk');
    toast('Готово: с целями '+r.with_goals+', без счётчика '+r.no_counter+', ошибок '+r.errors+' (из '+r.clients+' привязанных)','ok');
    refresh();
  }catch(e){}
}

/* ---------- CHATS ---------- */
async function renderChats(){
  const host=el('v_chats');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  let chats,cls;try{chats=await api('chats');cls=await api('clients');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  CHATS=chats;
  const opts=cls.map(c=>`<option value="${esc(c.login)}">${esc(c.name)} (${esc(c.login)})</option>`).join('');
  host.innerHTML=`
    <h2 class="title">Чаты</h2><p class="sub">Чаты появляются автоматически, когда бота туда добавляют. Сопоставь чат с клиентом.</p>
    <div class="panel"><div class="scrollx"><table>
      <thead><tr><th>Чат</th><th>ID</th><th>Тип</th><th>Статус</th><th>Привязка</th><th></th></tr></thead>
      <tbody>${chats.length?chats.map(c=>`
        <tr>
          <td>${esc(c.title)}</td><td class="muted">${c.chat_id}</td><td>${esc(c.type||'')}</td>
          <td>${c.status==='active'?'<span class="badge b-green">активен</span>':'<span class="badge b-grey">удалён</span>'}</td>
          <td><select id="bind_${c.chat_id}"><option value="">— не привязан —</option>${opts}</select></td>
          <td class="right"><button class="btn sm primary" onclick="doBind(${c.chat_id})">Сохранить</button> <button class="btn sm" onclick="doDeleteChat(${c.chat_id})" title="Удалить чат из базы">🗑</button></td>
        </tr>`).join(''):'<tr><td colspan="6" class="empty">Пока нет чатов. Запусти бота и добавь его в чат.</td></tr>'}
      </tbody></table></div></div>`;
  chats.forEach(c=>{if(c.login){const s=el('bind_'+c.chat_id);if(s)s.value=c.login;}});
}
async function doBind(chatId){const sel=el('bind_'+chatId);try{await api('bind',chatId,sel.value);toast(sel.value?'Привязано':'Привязка снята','ok');refresh();}catch(e){}}
async function doDeleteChat(chatId){
  if(!confirm('Удалить чат '+chatId+' из базы? Привязка к клиенту тоже снимется.\n(Сам чат в Telegram это не трогает — бот просто забудет о нём.)'))return;
  try{await api('delete_chat',chatId);toast('Чат удалён из базы','ok');refresh();}catch(e){}
}

/* ---------- MATCH ---------- */
async function renderMatch(){
  const host=el('v_match');host.innerHTML='<div class="empty"><span class="spin"></span> загрузка…</div>';
  let cloud=null;try{cloud=await api('cloud_status');}catch(e){}
  if(cloud&&cloud.configured){try{await api('cloud_pull');}catch(e){}}   // тянем общее состояние из облака
  let d;try{d=await api('suggestions');}catch(e){host.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>';return;}
  let cloudPanel='';
  if(cloud&&cloud.available&&!cloud.configured){
    cloudPanel=`<div class="note" style="margin-bottom:12px">☁ <b>Общая база (все устройства)</b>: не настроена. ${esc(cloud.note||'')}${cloud.sa_email?(' <code>'+esc(cloud.sa_email)+'</code>'):''}</div>`;
  }else if(cloud&&cloud.configured){
    cloudPanel=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <span class="badge b-green">☁ Общая база: ${esc(cloud.sheet)}</span>
      <button class="btn sm" onclick="doCloudPull()">↓ Загрузить из облака</button>
      <button class="btn sm" onclick="doCloudPush()">↑ Выгрузить в облако</button>
      <span class="muted" style="font-size:12px">Привязки тянутся автоматически при открытии и заливаются при изменении.</span>
    </div>`;
  }
  const opts=d.free_clients.map(c=>`<option value="${esc(c.login)}">${esc(c.name)} (${esc(c.login)})</option>`).join('');
  let rows=d.matches.map(m=>{
    const cc=m.confidence>=70?'hi':(m.confidence>=45?'mid':'lo');
    const right=m.suggest_login
      ? `<div class="src">🏢 ${esc(m.suggest_name)}<small>${esc(m.suggest_login)}</small></div>`
      : `<div><select id="mansel_${m.chat_id}" style="width:100%"><option value="">— выбрать клиента —</option>${opts}</select></div>`;
    const act=m.suggest_login
      ? `<div><button class="btn primary sm" onclick="doBind2(${m.chat_id},'${esc(m.suggest_login)}')">Привязать</button></div>`
      : `<div><button class="btn primary sm" onclick="doBindManual(${m.chat_id})">Привязать</button></div>`;
    return `<div class="matchrow">
      <div class="src">💬 ${esc(m.chat_title)}<small>чат ${m.chat_id}</small></div>
      <div class="arrow">↔ <div class="conf ${cc}">${m.suggest_login?(m.confidence+'%'):'нет совпадений'}</div></div>
      ${right}${act}</div>`;}).join('');
  const confN=d.matches.filter(m=>m.suggest_login&&m.confidence>=75).length;
  const bulk=confN?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn primary" onclick="doBindBulk()">⚡ Привязать все уверенные (≥75%) — ${confN} шт.</button>
      <span class="muted" style="font-size:12.5px">Массово привяжет очевидные совпадения; спорные останутся для ручной правки.</span>
    </div>`:'';
  host.innerHTML=`
    <h2 class="title">Привязки</h2>
    <p class="sub">Главный ручной шаг — сопоставить «чат ↔ клиент». Система предлагает совпадение, тебе остаётся подтвердить (или привязать все уверенные разом).</p>
    ${cloudPanel}
    <div class="panel"><div class="body">
      ${bulk}
      ${d.matches.length?rows:'<div class="empty">Нет чатов без привязки 🎉</div>'}
      <div class="note" style="margin-top:6px">🔒 В Telegram привязку командой /bind подтверждает только администратор (защита от ошибочной привязки чужого чата).</div>
    </div></div>`;
}
async function doBindBulk(){
  if(!confirm('Привязать все чаты с уверенным совпадением (≥75%) разом? Спорные останутся, их поправишь вручную.'))return;
  try{const r=await api('bind_bulk',75);toast('Привязано разом: '+r.bound,'ok');refresh();}catch(e){}
}
async function doCloudPull(){try{const r=await api('cloud_pull');toast('Из облака: привязок '+r.bindings+', целей '+r.goals,'ok');refresh();}catch(e){}}
async function doCloudPush(){try{const r=await api('cloud_push');toast('В облако: привязок '+r.bindings+', целей '+r.goals,'ok');}catch(e){}}
async function doBind2(chatId,login){try{await api('bind',chatId,login);toast('Привязано','ok');refresh();}catch(e){}}
async function doBindManual(chatId){const s=el('mansel_'+chatId);if(!s.value){toast('Выбери клиента','err');return;}try{await api('bind',chatId,s.value);toast('Привязано','ok');refresh();}catch(e){}}

/* ---------- GUIDE ---------- */
/* ---------- ГАЙД: вкладки + поиск ---------- */
const GUIDE=[
// ===== НАЧАЛО =====
{tab:'Начало',icon:'⚡',title:'С чего начать',kw:'старт начало первый вход кабинет обзор',html:`

  <p><b>Первые шаги:</b></p>
  <ol>
    <li>Войди по email и паролю (их выдаёт администратор).</li>
    <li>Слева — разделы: <b>Обзор, Клиенты, Чаты, Привязки, Отчёты, Таблицы, Настройки</b> (у админа ещё <b>Пользователи</b>).</li>
    <li>Твои клиенты уже назначены админом — открой <b>Клиенты</b>, чтобы их увидеть.</li>
    <li>Привяжи чаты клиентов (раздел <b>Привязки</b>) и жми <b>Рассылку</b>.</li>
  </ol>
  <div class="note">Совет: сначала прогони <b>«🧪 Пробу»</b> — она соберёт отчёты без отправки, чтобы убедиться, что всё в порядке.</div>`},
{tab:'Начало',icon:'🔐',title:'Вход, пароль, выход',kw:'логин пароль вход выход забыл сброс аккаунт email',html:`
  <p>Вход — по <b>email + пароль</b>. Регистрации нет: аккаунты заводит только администратор.</p>
  <ul>
    <li><b>Забыл пароль?</b> Попроси админа — он сменит его в разделе «Пользователи» (кнопка «Пароль»).</li>
    <li><b>Выйти</b> — иконка ⎋ справа вверху (рядом с твоим именем).</li>
    <li>Сессия держится ~30 дней, повторно вводить пароль каждый раз не нужно.</li>
  </ul>`},
{tab:'Начало',icon:'🧭',title:'Разделы кабинета',kw:'меню разделы навигация интерфейс сайдбар вкладки',html:`
  <ul>
    <li><b>Обзор</b> — сводка + кнопки рассылки.</li>
    <li><b>Клиенты</b> — твои клиенты, их цели и привязанные чаты.</li>
    <li><b>Чаты</b> — Telegram-чаты, где есть бот.</li>
    <li><b>Привязки</b> — связать чат ↔ клиент (с подсказками).</li>
    <li><b>Отчёты</b> — предпросмотр, конструктор, история отправок.</li>
    <li><b>Таблицы</b> — выгрузка в Google-таблицы клиентов.</li>
    <li><b>Настройки</b> — тексты отчёта, атрибуция, расписание.</li>
    <li><b>Пользователи</b> (только админ) — сотрудники и раздача клиентов.</li>
  </ul>`},
{tab:'Начало',icon:'🌗',title:'Тема и обновление',kw:'тема светлая тёмная обновить refresh',html:`
  <p>Вверху справа: <b>🌙/☀️</b> — переключить светлую/тёмную тему (запоминается), <b>⟳ Обновить</b> — перечитать данные с сервера.</p>`},
// ===== КЛИЕНТЫ =====
{tab:'Клиенты',icon:'👥',title:'Что такое клиент',kw:'клиент логин директ аккаунт кто такой',html:`
  <p><b>Клиент</b> = рекламный аккаунт в Яндекс.Директе (его логин, напр. <span class="gkbd">porg-xxxx</span> или <span class="gkbd">kupijigru</span>). У клиента есть имя (обычно домен), цели Метрики, модель атрибуции и привязанные чаты, куда уходят отчёты.</p>
  <p>Ты видишь только <b>своих</b> клиентов (тех, кого админ закрепил за тобой или кого ты подцепил привязкой). Админ видит всех.</p>`},
{tab:'Клиенты',icon:'🔄',title:'Откуда берутся клиенты',kw:'синхронизация подтянуть директ пул общий sync агентство',html:`
  <p>Клиенты тянутся из агентского аккаунта Директа. Кнопка <b>«Подтянуть из Директа»</b> (только у админа) добавляет всех клиентов агентства в <b>общий пул</b> (пока ничьи).</p>
  <p>Дальше клиенты попадают к специалистам двумя путями:</p>
  <ul>
    <li><b>Админ раздаёт</b> — раздел «Пользователи» → назначить клиента.</li>
    <li><b>Специалист сам подцепляет</b> — привязал чат свободного клиента → клиент закрепился за ним (см. вкладку «Чаты и привязки»).</li>
  </ul>`},
{tab:'Клиенты',icon:'🗂',title:'Карточка клиента',kw:'карточка имя домен атрибуция сохранить редактировать',html:`
  <p>Клик по клиенту открывает карточку: <b>имя</b> (используется как домен для поиска Google-таблицы), <b>атрибуция</b> и <b>цели</b>. «Сохранить» — записать изменения, «📨 Тестовый отчёт» — прислать отчёт в привязанный чат для проверки.</p>`},
{tab:'Клиенты',icon:'🎯',title:'Цели: ключевые и микро',kw:'цели метрика активные ключевые микро галочки конверсии лиды',html:`
  <p>У клиента подтягиваются <b>все</b> цели Метрики, но не все идут в отчёт:</p>
  <ul>
    <li><b>Ключевые</b> (галочка есть) — реальные лиды: заявки, звонки, покупки. Они попадают в отчёт и в «Конверсии».</li>
    <li><b>Микро</b> (галочки нет) — просмотры страниц, корзина, калькулятор. Тянутся, но по умолчанию без галочки — их можно доактивировать вручную.</li>
  </ul>
  <p>Кнопка <b>«Цели из Метрики»</b> подтягивает/обновляет цели и сразу помечает ключевые. Что отмечено галочкой — то и считается конверсией в отчётах и таблицах.</p>`},
// ===== ЧАТЫ И ПРИВЯЗКИ =====
{tab:'Чаты и привязки',icon:'🤖',title:'Бот и как он видит чаты',kw:'бот webhook добавить группа чат telegram видит',html:`
  <p>Отчёты шлёт агентский Telegram-бот. Чтобы он увидел чат клиента — <b>добавь бота в группу</b> клиента (лучше администратором). Бот сразу определит чат, напишет в него «я на связи» и покажется в разделе <b>Чаты</b>.</p>
  <div class="note">Бот работает через webhook на сервере — он ловит новые чаты всегда, ничего запускать не нужно.</div>`},
{tab:'Чаты и привязки',icon:'🔗',title:'Привязать чат к клиенту',kw:'привязка привязать чат клиент bind связать',html:`
  <p>Привязка = «этому чату слать отчёты этого клиента».</p>
  <p><b>Способ 1 — ссылка:</b> кнопка <b>＋ Подключить клиента</b> → выбери клиента → «Получить ссылку» → открой её и выбери группу. Бот зайдёт и привяжется сам.</p>
  <p><b>Способ 2 — вручную:</b> добавь бота в группу → чат появится в <b>Чаты</b> → в <b>Привязки</b> подтверди предложенного клиента или выбери вручную.</p>
  <p><b>Способ 3 — команда:</b> прямо в чате набери <span class="gkbd">/bind &lt;логин&gt;</span>.</p>`},
{tab:'Чаты и привязки',icon:'🧲',title:'Правило «привязал → взял»',kw:'закрепил забрал свой клиент владелец захват специалист',html:`
  <p><b>Ключевое правило:</b> когда специалист привязывает чат к <b>свободному</b> (ничьему) клиенту — этот клиент автоматически закрепляется за ним. Так формируется твой стек клиентов.</p>
  <ul>
    <li>Привязать можно своего или свободного клиента; <b>чужого</b> (закреплённого за другим специалистом) — нельзя.</li>
    <li>Админ раздаёт/переназначает клиентов поверх — его слово последнее.</li>
  </ul>`},
{tab:'Чаты и привязки',icon:'⚡',title:'Массовая привязка',kw:'массовая bind_bulk авто уверенность порог много',html:`
  <p>В разделе <b>Привязки</b> кнопка массовой привязки цепляет все непривязанные чаты, где совпадение с клиентом уверенное (по порогу). Остальное подправишь вручную. Массово цепляются только свои и свободные клиенты.</p>`},
{tab:'Чаты и привязки',icon:'💬',title:'Команды бота в чате',kw:'команды start bind unbind whereami chats help бот',html:`
  <ul>
    <li><span class="gkbd">/start</span> или <span class="gkbd">/whereami</span> — где я и к кому привязан.</li>
    <li><span class="gkbd">/bind &lt;логин&gt;</span> — привязать чат к клиенту (только админ/владелец бота).</li>
    <li><span class="gkbd">/unbind</span> — снять привязку.</li>
    <li><span class="gkbd">/chats</span> — список известных чатов, <span class="gkbd">/help</span> — справка.</li>
  </ul>`},
// ===== РАССЫЛКА =====
{tab:'Рассылка',icon:'📨',title:'Как запустить рассылку',kw:'рассылка запустить отправить отчёты неделя кнопка',html:`
  <p>Раздел <b>Обзор</b> → <b>«📨 Запустить рассылку сейчас»</b>. Соберёт отчёты за прошлую неделю и отправит в чаты <b>твоих</b> клиентов.</p>
  <ul>
    <li>Ты (специалист) шлёшь только своих клиентов; админ — тоже своих. У каждого свой стек — пересечений нет.</li>
    <li>«Отправить всем разом по агентству» делает <b>автозапуск (cron)</b>, а не кнопка (см. «Автозапуск»).</li>
  </ul>`},
{tab:'Рассылка',icon:'📊',title:'Окно прогресса',kw:'прогресс окно статус счётчик отправлено ошибка',html:`
  <p>После запуска открывается окно прогресса: живой счётчик <b>(готово/всего)</b> и строка по каждому клиенту:</p>
  <ul>
    <li>✅ отправлено (и в скольких чатах),</li>
    <li>⏭️ пропущен (нет активных кампаний за 4 недели),</li>
    <li>🚫 нет привязанного чата,</li>
    <li>❌ ошибка (с причиной).</li>
  </ul>
  <p>Внизу — итог и, если были сбои, кнопка «🔁 Переотправить недошедшим».</p>`},
{tab:'Рассылка',icon:'🧪',title:'Проба (без отправки)',kw:'проба dry-run тест проверка без отправки сухой прогон',html:`
  <p>Кнопка <b>«🧪 Проба (без отправки)»</b> рядом с рассылкой прогоняет всё <b>с тем же окном прогресса, но клиентам ничего не шлёт</b>. Каждый отчёт помечается 🧪 «собран».</p>
  <p>Зачем: за минуту убедиться, что все отчёты собираются (никто не отвалится по ошибке, ни у кого не «нет чата») — <b>перед</b> боевым запуском.</p>`},
{tab:'Рассылка',icon:'🔁',title:'Переотправить недошедшим',kw:'переотправить недошедшие ошибка повтор failed',html:`
  <p>Если после рассылки у кого-то ❌/🚫 — кнопка <b>«🔁 Переотправить недошедшим»</b> повторит отправку <b>только этим</b> клиентам (не всем заново). После пробы кнопка не показывается, чтобы не отправить случайно вживую.</p>`},
{tab:'Рассылка',icon:'🕘',title:'Автозапуск по расписанию',kw:'автозапуск расписание cron планировщик понедельник еженедельно weekly',html:`
  <p>Каноничная недельная рассылка «по всему агентству» настраивается через <b>cron на сервере</b> (панель хостинга Beget → Cron), команда <span class="gkbd">python -m iigbot weekly</span>, например по понедельникам 09:00. Он один раз шлёт всем — без дублей.</p>
  <p>Кнопки в кабинете — для ручного/точечного запуска (свои клиенты), cron — для автоматики.</p>`},
{tab:'Рассылка',icon:'🧾',title:'Что внутри отчёта',kw:'структура отчёт текст кампании конверсии cpa приписка вступление',html:`
  <p>Отчёт за неделю содержит: вступление, клиента и период, метрики (показы/клики/расход/CTR/CPC), <b>конверсии по ключевым целям</b> с CR и CPA, а при нескольких кампаниях — разбивку. В конце — <b>приписка специалиста</b> (если задана в Настройках; можно оставить пустой).</p>`},
// ===== GOOGLE-ТАБЛИЦЫ =====
{tab:'Google-таблицы',icon:'📗',title:'Что выгружается',kw:'google таблицы выгрузка ленты разрезы месяц неделя',html:`
  <p>Раздел <b>Таблицы</b> заполняет Google-таблицу клиента («Auto-Reporter ОТЧЕТ &lt;домен&gt;»):</p>
  <ul>
    <li><b>Ленты</b> «Общий по неделям» / «по месяцам» — свежие данные период за периодом.</li>
    <li><b>Составные листы месяца</b> — блок по кампаниям + под-блок недель.</li>
    <li><b>Разрезы</b> (снимки) — по РК, группам, ключам, поисковым фразам, регионам за период.</li>
  </ul>`},
{tab:'Google-таблицы',icon:'🔢',title:'Как считаются конверсии',kw:'конверсии таблица цели единый подсчёт сходятся тотал',html:`
  <p>И ленты, и разрезы считают конверсии <b>по одним и тем же ключевым целям</b> — поэтому «по неделям» и «тотал по кампаниям» сходятся. Раньше разрезы брали «голое» поле Conversions Директа (другая метрика) — это исправлено.</p>
  <div class="note">Небольшое расхождение свежей выгрузки и старых недельных снимков — норма: Директ дозачисляет конверсии задним числом (лиды доходят не сразу).</div>`},
{tab:'Google-таблицы',icon:'🔑',title:'Доступ к таблице клиента',kw:'sa_key сервисный ключ расшарить доступ google редактор',html:`
  <p>Чтобы кабинет мог писать в таблицу, она должна быть <b>расшарена (Редактор)</b> на сервисный аккаунт (его email виден в разделе, где настраивается доступ). Ключ <span class="gkbd">sa_key.json</span> уже стоит на сервере.</p>`},
// ===== ПОЛЬЗОВАТЕЛИ =====
{tab:'Пользователи',icon:'🔑',title:'Админ и специалист',kw:'роли админ специалист права доступ что может видит',html:`
  <p><b>Специалист</b> — видит и рассылает только своих клиентов; может подцеплять свободных привязкой.</p>
  <p><b>Админ</b> — видит всех клиентов и чаты, заводит сотрудников, раздаёт/переназначает клиентов, синхронизирует Директ. При этом админ тоже ведёт <b>свой стек</b> и рассылает по кнопке только своих (см. «Рассылка»).</p>`},
{tab:'Пользователи',icon:'👤',title:'Завести сотрудника',kw:'создать пользователь сотрудник email пароль пригласить роль',html:`
  <p>Раздел <b>Пользователи</b> (только админ) → «Новый пользователь»: email, имя, временный пароль, роль (специалист/админ) → «Создать». Публичной регистрации нет — только так.</p>`},
{tab:'Пользователи',icon:'🎛',title:'Раздать клиентов',kw:'назначить раздать клиент владелец специалист пул',html:`
  <p>Внизу раздела «Пользователи» — список всех клиентов с владельцем. Выбери специалиста в выпадашке напротив клиента → он закреплён за ним. Есть поиск по названию. «— общий пул —» возвращает клиента в ничьи.</p>`},
{tab:'Пользователи',icon:'🚫',title:'Блокировка и пароль',kw:'заблокировать деактивировать пароль сменить уволить',html:`
  <p>В таблице пользователей: <b>«Пароль»</b> — сменить, <b>«Заблокировать»</b> — деактивировать (сотрудник не сможет войти, клиенты остаются за ним, пока не переназначишь).</p>`},
// ===== НАСТРОЙКИ =====
{tab:'Настройки',icon:'✍️',title:'Тексты отчёта',kw:'вступление приписка специалист текст комментарий опционально настройки',html:`
  <p><b>Вступление</b> — первая строка отчёта. <b>Приписка специалиста</b> — необязательна: впишешь текст → он появится внизу отчёта; оставишь пустым → приписки не будет. Применяется ко всем отчётам (рассылка, тест, конструктор).</p>`},
{tab:'Настройки',icon:'📐',title:'Модель атрибуции',kw:'атрибуция lsc lc fc lydc модель конверсии',html:`
  <p>Атрибуция по умолчанию для отчётов: <b>LSC</b> (последний значимый клик), <b>LC</b> (последний), <b>FC</b> (первый), <b>LYDC</b> (последний клик из Директа — обычно для таблиц). У конкретного клиента можно переопределить в карточке.</p>`},
{tab:'Настройки',icon:'🗓',title:'День и время',kw:'день время расписание рассылка когда справочно',html:`
  <p>Поля «День рассылки» и «Время» — справочные (для памяти). Реальный автозапуск задаётся в cron на сервере (см. «Рассылка → Автозапуск»). Кнопка «Запустить рассылку» работает в любой момент.</p>`},
// ===== КОНСТРУКТОР =====
{tab:'Конструктор',icon:'🛠',title:'Конструктор отчётов',kw:'конструктор разрез уровень срез период экспорт xlsx кампании ключи регионы',html:`
  <p><b>Отчёты → Конструктор</b> — произвольный разрез Директа за любой период: уровень (аккаунт / кампании / группы / объявления / фразы / поисковые запросы), доп-срезы (дата, устройство, пол/возраст, гео, тип сети), модель атрибуции и цели. Можно посмотреть, отправить в чат клиента или выгрузить в <b>.xlsx</b>.</p>`},
// ===== FAQ =====
{tab:'FAQ',icon:'❓',title:'Частые вопросы',kw:'faq вопросы почему не вижу дубли кто рассылает клиент пропал',html:`
  <p><b>Почему я не вижу клиента?</b> Он не закреплён за тобой. Попроси админа назначить или привяжи его чат — заберёшь себе.</p>
  <p><b>Придёт ли клиенту отчёт дважды?</b> Нет, если каждый жмёт только свою рассылку. Дубль возможен только если и ты, и другой специалист вручную запустите одного клиента (у вас он один быть не может — он за кем-то одним).</p>
  <p><b>Кому уйдёт по моей кнопке?</b> Только твоим привязанным клиентам.</p>
  <p><b>«Проба» отправляет клиентам?</b> Нет, ничего не шлёт — только собирает отчёты.</p>
  <p><b>Клиент без чата — почему пропущен?</b> Некуда слать. Привяжи ему чат.</p>`},
// ===== ПРОБЛЕМЫ =====
{tab:'Проблемы',icon:'🩹',title:'Если что-то не так',kw:'проблема ошибка не работает бот молчит рассылка 0 favicon кеш',html:`
  <ul>
    <li><b>Рассылка пишет «нет клиентов»</b> — за тобой не закреплён ни один клиент. Привяжи чат или попроси админа назначить.</li>
    <li><b>Клиент ⏭️ пропущен</b> — нет активных кампаний за 4 недели (это норма) — либо у него правда нет открута.</li>
    <li><b>🚫 нет чата</b> — клиент не привязан ни к одной группе. Привяжи в разделе «Привязки».</li>
    <li><b>Бот не отвечает в чате</b> — проверь, что он в группе (лучше админом). На сервере бот работает через webhook постоянно.</li>
    <li><b>Иконка-панда во вкладке старая</b> — браузеры кешируют favicon, помогает жёсткое обновление (Ctrl+F5).</li>
    <li><b>«Сессия истекла»</b> — просто войди заново.</li>
  </ul>`},
];

}

async function pollRun(){
  let p;try{p=await api('run_weekly_progress');}catch(e){return;}
  const H=el('runHead');if(H)H.textContent=(p.dry?'🧪 проба · ':'')+(p.total?('('+p.done+'/'+p.total+')'):'…');

  const rows=(p.details||[]).slice().reverse().map(d=>{
    const ex=d.status==='sent'?('отправлено в чатов: '+(d.chats||0)):d.status==='dry'?('проба: отчёт собран (чатов '+(d.chats||0)+')'):esc(d.reason||d.status||'');
    return '<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(150,150,170,.12)"><span>'+ic(d.status)+'</span><div style="flex:1;min-width:0"><b>'+esc(d.name||d.login)+'</b><div class="muted" style="font-size:12px;word-break:break-word">'+ex+'</div></div></div>';}).join('');
  el('runBody').innerHTML=rows||'<div class="muted" style="padding:14px 0"><span class="spin"></span> запускаю…</div>';

  else{
    const s=p.summary||{};const failed=(s.details||[]).filter(d=>d.status==='error'||d.status==='no_chat').length;
    F.innerHTML=((!p.dry&&failed)?('<button class="btn" onclick="runFailedAgain()">🔁 Переотправить недошедшим ('+failed+')</button>'):'')+
      '<span class="muted" style="margin-right:auto;font-size:12.5px">'+(p.dry?'Проба (без отправки) — ':'')+'Итог: ✅ '+(s.sent||0)+(s.dry?(' · 🧪 '+s.dry):'')+' · ⏭️ '+(s.skipped||0)+' · 🚫 '+(s.no_chat||0)+' · ❌ '+(s.errors||0)+'</span>'+
      '<button class="btn primary" onclick="closeRunModal()">Закрыть</button>';
    if(p.error)el('runBody').innerHTML+='<div style="color:var(--red,#e5484d);padding-top:8px">Ошибка запуска: '+esc(p.error)+'</div>';
    loadBadges();
  }
}

function rbShell(r){
  let head=`<div style="margin-bottom:8px"><b>${esc(r.client_name)}</b> · ${esc(r.level_label)}`;
  if(r.segments&&r.segments.length)head+=` · +${r.segments.length} срез(а)`;
  head+=` · атрибуция ${esc(r.attribution)} · ${esc(r.date_from)}…${esc(r.date_to)}`;
  if(!r.use_conv)head+=' · <span class="muted">конверсии для этого разреза недоступны</span>';
  else if(!r.by_goals)head+=' · <span class="muted">конверсии — суммарные (без целей)</span>';
  head+='</div>';
  const toolbar=`<div style="display:flex;gap:10px;align-items:center;margin:0 0 10px;flex-wrap:wrap"><input type="search" id="rbSearch" placeholder="🔎 фильтр по строкам…" style="min-width:220px" oninput="rbDrawTable()"><span class="muted" id="rbCount"></span></div>`;
  return head+toolbar+'<div id="rbTable"></div>';
}
function rbDrawTable(){
  const r=RB_LAST,host=el('rbTable');if(!r||!host)return;
  const cols=rbCols(r);
  const q=(el('rbSearch')?el('rbSearch').value:'').trim().toLowerCase();
  let rows=r.rows.slice();
  if(q)rows=rows.filter(row=>row.dims.some(d=>String(d).toLowerCase().includes(q)));
  const sk=RB_SORT.key,dir=RB_SORT.dir;
  rows.sort((a,b)=>{
    if(sk.indexOf('dim')===0){const i=+sk.slice(3);return dir*String(a.dims[i]||'').localeCompare(String(b.dims[i]||''),'ru',{numeric:true});}
    return dir*(((a.m[sk]||0))-((b.m[sk]||0)));
  });
  const arrow=k=>sk===k?(dir<0?' ▼':' ▲'):'';
  const dimTh=r.dim_titles.map((t,i)=>`<th onclick="rbSort('dim${i}')" style="cursor:pointer;user-select:none">${esc(t)}${arrow('dim'+i)}</th>`).join('');
  const metTh=cols.map(c=>`<th class="right" onclick="rbSort('${c.key}')" style="cursor:pointer;user-select:none">${esc(c.label)}${arrow(c.key)}</th>`).join('');
  const cell=m=>cols.map(c=>'<td class="right">'+c.fmt(m)+'</td>').join('');
  const totalRow=`<tr style="font-weight:700;background:var(--surface-2)"><td colspan="${r.dim_titles.length}">ИТОГО</td>${cell(r.totals)}</tr>`;
  const body=rows.map(row=>'<tr>'+row.dims.map(d=>'<td>'+esc(d||'—')+'</td>').join('')+cell(row.m)+'</tr>').join('');
  host.innerHTML=`<div class="scrollx"><table><thead><tr>${dimTh}${metTh}</tr></thead><tbody>${totalRow}${body}</tbody></table></div>`;
  const cnt=el('rbCount');if(cnt)cnt.textContent='строк: '+rows.length+(q?(' (из '+r.rows.length+')'):'')+' · всего по API: '+r.n_total;
}
function rbSort(key){if(RB_SORT.key===key)RB_SORT.dir*=-1;else RB_SORT={key,dir:key.indexOf('dim')===0?1:-1};rbDrawTable();}
function rbRerender(){if(RB_LAST&&el('rbTable'))rbDrawTable();}

        <div><label class="mini-2">Email</label><input id="nuEmail" type="email" placeholder="ivan@iig.ru"></div>
        <div><label class="mini-2">Имя</label><input id="nuName" placeholder="Иван"></div>
        <div><label class="mini-2">Пароль</label><input id="nuPass" placeholder="временный пароль"></div>
        <div><label class="mini-2">Роль</label><select id="nuRole"><option value="user">Специалист</option><option value="admin">Администратор</option></select></div>
        <button class="btn primary" onclick="userCreate()">Создать</button>
      </div>
    </div>
    <div class="panel" style="margin-bottom:16px">
      <h3>Пользователи (${users.length})</h3>
      <table><thead><tr><th>Пользователь</th><th>Роль</th><th>Статус</th><th class="right">Клиентов</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" class="muted">Пусто</td></tr>'}</tbody></table>
    </div>
    <div class="panel">
      <h3>Клиенты и владельцы — не назначено: ${unassigned} из ${POOL.length}</h3>
      <div style="padding:12px 16px 4px"><input id="poolFilter" placeholder="Поиск клиента…" oninput="poolFilter()" style="width:100%"></div>
      <table><thead><tr><th>Клиент</th><th style="width:240px">Владелец</th></tr></thead>
      <tbody id="poolBody">${poolRows(POOL,opts)}</tbody></table>
    </div>`;
}
function poolRows(list,opts){
  return list.map(c=>`<tr data-q="${esc((c.name||'')+' '+c.login).toLowerCase()}">
      <td><b>${esc(c.name||c.login)}</b><div class="mini-2">${esc(c.login)}</div></td>
      <td><select onchange="assignClient('${esc(c.login)}',this.value)">
        <option value="">— общий пул —</option>
        ${opts.replace('value="'+(c.owner||'')+'"','value="'+(c.owner||'')+'" selected')}
      </select></td></tr>`).join('');
}
function poolFilter(){
  const q=(el('poolFilter').value||'').trim().toLowerCase();
  document.querySelectorAll('#poolBody tr').forEach(tr=>{
    tr.style.display = (!q || (tr.dataset.q||'').indexOf(q)>=0) ? '' : 'none';
  });
}
async function userCreate(){
  const email=el('nuEmail').value.trim(), name=el('nuName').value.trim(),
        pass=el('nuPass').value, role=el('nuRole').value;
  if(!email||!pass){toast('Нужны email и пароль','err');return;}
  try{ await api('user_create',email,pass,name,role); toast('Пользователь создан'); renderUsers(); }
  catch(e){}
}
async function userToggle(id,active){ try{ await api('user_set_active',id,!!active); renderUsers(); }catch(e){} }
async function userPass(id){
  const p=prompt('Новый пароль для пользователя:');
  if(!p)return;
  try{ await api('user_set_password',id,p); toast('Пароль обновлён'); }catch(e){}
}
async function assignClient(login,uid){
  try{ await api('assign_client',login,uid||null);
    const c=POOL.find(x=>x.login===login); if(c)c.owner=uid?parseInt(uid):null;
    toast('Сохранено'); }
  catch(e){ renderUsers(); }
}

/* ---------- init ---------- */
function init(){
  if(READY)return;READY=true;
  const t=document.documentElement.getAttribute('data-theme')||'light';const tb=el('themeBtn');if(tb)tb.textContent=(t==='dark'?'☀️':'🌙');
  el('botInfo').textContent='Готово';
  applyUser();
  go('dashboard');loadBadges();
  const modeTx = ME ? ('Веб · '+esc(ME.email)) : 'Десктоп · ПК-режим';
  api('settings').then(s=>{el('botInfo').innerHTML='Бот: @'+esc((s.telegram&&s.telegram.username)||'?')+'<br><span class="mini-2">'+modeTx+'</span>';
    el('botPill').innerHTML='<span class="dot"></span> '+(s.telegram.status==='ок'?'Подключён':'Нет связи');
    if(s.telegram.status!=='ок')el('botPill').classList.add('grey');}).catch(()=>{});
}
window.addEventListener('pywebviewready',init);                                     // десктоп (без входа)
setTimeout(()=>{if(!READY&&location.protocol.indexOf('http')===0)bootWeb();},120);  // веб: сперва проверка входа
setTimeout(()=>{if(!READY&&window.pywebview&&window.pywebview.api)init();},600);    // десктоп (запас)
setTimeout(()=>{if(!READY&&!el('loginBg').classList.contains('on'))el('v_dashboard').innerHTML='<div class="empty">Нет связи с backend.<br>Десктоп: запусти IIGReporter.exe. Веб: открой адрес веб-версии в браузере.</div>';},2500);
</script>
</body>
</html>
